<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-05 {
  width: 1242px;
  height: 1660px;
  box-sizing: border-box;
  background-color: #0F172A;
  color: #F8FAFC;
  padding: 120px 100px;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 80px;
}

.header-icon {
  font-size: 46px;
}

.header-label {
  font-size: 38px;
  font-weight: 500;
  color: #94A3B8;
}

.page-title {
  margin-bottom: 100px;
}

.title-line {
  font-size: 100px;
  font-weight: 800;
  line-height: 1.35;
  color: #FFFFFF;
}

.action-list {
  display: flex;
  flex-direction: column;
  gap: 64px;
}

.action-item {
  display: flex;
  flex-direction: column;
  gap: 20px;
  border-left: 8px solid #38BDF8;
  padding-left: 36px;
}

.action-tag {
  font-size: 44px;
  font-weight: 700;
  color: #38BDF8;
}

.action-text {
  font-size: 40px;
  line-height: 1.6;
  color: #CBD5E1;
}
</style>
</head>
<body>
<main class="page page-05 type-cta">
  <header class="page-header">
    <span class="header-icon">🔍</span>
    <span class="header-label">05 / 验算与证据</span>
  </header>
  <div class="page-title">
    <div class="title-line">比起下结论</div>
    <div class="title-line">我更想看这笔账哪里有漏洞</div>
  </div>
  <div class="action-list">
    <div class="action-item">
      <div class="action-tag">验算账本</div>
      <div class="action-text">如果中美两边的算法太保守，账本可以重做。我正在整理两套计算的公开表格，留给懂财税的人挑错。</div>
    </div>
    <div class="action-item">
      <div class="action-tag">留下线索</div>
      <div class="action-text">记录比情绪有用。如果你的行业已经被AI改价，或者初级岗位被外包替代，可以在评论区留下线索。</div>
    </div>
    <div class="action-item">
      <div class="action-tag">寻找单据</div>
      <div class="action-text">这笔账刚翻开第一页。降薪通知、外包合同、招聘冻结邮件，这些具体的单据，都是重做账本的证据。</div>
    </div>
  </div>
</main>
</body>
</html>
