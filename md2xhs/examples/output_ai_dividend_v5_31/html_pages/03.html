<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page { width: 1242px; height: 1660px; box-sizing: border-box; padding: 100px 96px; background-color: #FAFAFA; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; position: relative; overflow: hidden; } .page-header { display: flex; align-items: center; margin-bottom: 64px; } .header-icon { font-size: 42px; margin-right: 16px; } .header-label { font-size: 38px; color: #888888; font-weight: 600; letter-spacing: 0; } .title-section { margin-bottom: 72px; } .page-title { font-size: 112px; font-weight: 900; color: #111111; line-height: 1.3; margin: 0; letter-spacing: 0; } .accent-title { color: #2563EB; } .list-section { display: flex; flex-direction: column; gap: 36px; } .card-item { background-color: #FFFFFF; border: 2px solid #E5E7EB; border-radius: 16px; padding: 48px; } .card-tag { display: inline-block; font-size: 36px; color: #1E40AF; background-color: #DBEAFE; padding: 8px 20px; border-radius: 8px; font-weight: 700; margin-bottom: 24px; letter-spacing: 0; } .card-text { font-size: 42px; color: #333333; line-height: 1.6; font-weight: 400; margin: 0; letter-spacing: 0; }
</style>
</head>
<body>
<main class="page page-03 type-body">
  <header class="page-header">
    <span class="header-icon">💰</span>
    <span class="header-label">03 / 弹窗与账户</span>
  </header>
  <section class="title-section">
    <p class="page-title">重点不是怎么分钱</p>
    <p class="page-title accent-title">是账本少了一页</p>
  </section>
  <section class="list-section">
    <div class="card-item">
      <span class="card-tag">缓冲金</span>
      <p class="card-text">如果拿20%算作数据池的缓冲金，约合1007亿元人民币。但这笔钱只停留在草稿里，不在公共账户上。</p>
    </div>
    <div class="card-item">
      <span class="card-tag">账本断裂</span>
      <p class="card-text">账本的断裂很明显。巨额利润安稳躺在公司的财报里，而用户只留在隐私协议的弹窗中。</p>
    </div>
    <div class="card-item">
      <span class="card-tag">会计问题</span>
      <p class="card-text">灾难预言太省事，这只是个简单的会计问题。利润有清楚的入账单，风险还在统计口径外。</p>
    </div>
  </section>
</main>
</body>
</html>
