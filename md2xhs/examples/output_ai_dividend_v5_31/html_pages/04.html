<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-04 {
  width: 1242px;
  height: 1660px;
  box-sizing: border-box;
  padding: 100px;
  background-color: #F7F8FA;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
}
.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 60px;
}
.header-icon {
  font-size: 44px;
}
.header-label {
  font-size: 38px;
  color: #888888;
  font-weight: 600;
  letter-spacing: 0;
}
.title-section {
  margin-bottom: 80px;
}
.page-title {
  font-size: 104px;
  font-weight: 900;
  line-height: 1.25;
  color: #1A1A1A;
  margin: 0;
  letter-spacing: 0;
}
.list-section {
  display: flex;
  flex-direction: column;
  gap: 32px;
}
.list-item {
  background: #FFFFFF;
  border-radius: 16px;
  padding: 40px 48px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
  border-left: 8px solid #2B5CFF;
}
.item-tag {
  font-size: 36px;
  font-weight: 800;
  color: #2B5CFF;
  margin-bottom: 20px;
  letter-spacing: 0;
  display: inline-block;
  background: rgba(43,92,255,0.08);
  padding: 8px 24px;
  border-radius: 8px;
}
.item-text {
  font-size: 40px;
  line-height: 1.55;
  color: #333333;
  margin: 0;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-04 type-body">
  <header class="page-header">
    <span class="header-icon">📅</span>
    <span class="header-label">04 / 隐蔽的账单</span>
  </header>
  <section class="title-section">
    <p class="page-title">国内的账单</p>
    <p class="page-title">藏在排班表和外包单价里</p>
  </section>
  <section class="list-section">
    <div class="list-item">
      <span class="item-tag">国内账单</span>
      <p class="item-text">阿里云、腾讯营销和百度云的报表在涨。保守估算，国内AI超额利润在160到333亿元。</p>
    </div>
    <div class="list-item">
      <span class="item-tag">排班表</span>
      <p class="item-text">国际劳工组织把影响拆得很细。系统没打算直接消灭职业，它只是悄悄改了排班表。</p>
    </div>
    <div class="list-item">
      <span class="item-tag">外包单价</span>
      <p class="item-text">顺便砍了外包单价。知识工作者既相信AI能提效，又担心被替代，效率和焦虑挤在同一张工位上。</p>
    </div>
  </section>
</main>
</body>
</html>
