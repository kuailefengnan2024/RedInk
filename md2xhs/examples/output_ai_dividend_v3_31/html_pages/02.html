<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page { width: 1242px; height: 1660px; background-color: #F9F9F6; box-sizing: border-box; padding: 100px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: #1A1A1A; position: relative; letter-spacing: 0; display: flex; flex-direction: column; } .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 80px; } .header-icon { font-size: 48px; } .header-label { font-size: 40px; color: #666666; font-weight: 500; letter-spacing: 0; } .title-section { margin-bottom: 120px; } .page-title { display: flex; flex-direction: column; gap: 24px; } .page-title p { margin: 0; font-size: 110px; font-weight: 800; line-height: 1.2; color: #1A1A1A; } .page-title p:last-child { color: #C12C26; } .content-section { flex: 1; display: flex; flex-direction: column; } .proof-list { display: flex; flex-direction: column; gap: 52px; } .proof-item { display: flex; flex-direction: column; gap: 24px; padding-bottom: 40px; border-bottom: 2px solid #EAEAEA; } .proof-item:last-child { border-bottom: none; padding-bottom: 0; } .proof-tag { align-self: flex-start; font-size: 38px; font-weight: 600; color: #C12C26; background-color: #F2E3E2; padding: 12px 24px; border-radius: 8px; } .proof-text { margin: 0; font-size: 44px; line-height: 1.6; color: #333333; font-weight: 400; }
</style>
</head>
<body>
<main class="page page-02 type-body">
  <header class="page-header">
    <span class="header-icon">📉</span>
    <span class="header-label">02 / 现象</span>
  </header>
  <section class="title-section">
    <div class="page-title">
      <p>AI没发全员裁员信</p>
      <p>它只是冻结了招聘入口</p>
    </div>
  </section>
  <section class="content-section">
    <div class="proof-list">
      <div class="proof-item">
        <span class="proof-tag">排班表</span>
        <p class="proof-text">企业很少发全员信说裁员，但22到25岁的软件开发者，就业盘子直接少了近20%。</p>
      </div>
      <div class="proof-item">
        <span class="proof-tag">报价单</span>
        <p class="proof-text">失业率还没爆，客服和初级原画先被压了预算，报表还没发，外包的单价先瘦了。</p>
      </div>
      <div class="proof-item">
        <span class="proof-tag">工位</span>
        <p class="proof-text">知识工作者一边在调查里赞美效率，一边看着简历投不出去，效率和焦虑挤在同一张工位上。</p>
      </div>
    </div>
  </section>
</main>
</body>
</html>
