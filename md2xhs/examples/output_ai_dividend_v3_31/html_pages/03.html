<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }

* { box-sizing: border-box; margin: 0; padding: 0; letter-spacing: 0; }
.page-03 {
  background-color: #F8F9FA;
  color: #1A1A1A;
  padding: 88px 96px;
  display: flex;
  flex-direction: column;
  position: relative;
  width: 1242px;
  height: 1660px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}
.icon {
  font-size: 40px;
}
.label {
  font-size: 38px;
  font-weight: 600;
  color: #666666;
}
.metric-section {
  margin-bottom: 48px;
  border-bottom: 3px solid #1A1A1A;
  padding-bottom: 32px;
}
.metric-value {
  font-size: 160px;
  font-weight: 900;
  color: #E63946;
  line-height: 1;
  margin-bottom: 12px;
}
.unit {
  font-size: 64px;
  font-weight: 700;
  margin-left: 8px;
}
.metric-sub {
  font-size: 40px;
  color: #4A4A4A;
  font-weight: 500;
}
.title-section {
  margin-bottom: 48px;
}
.page-title {
  font-size: 96px;
  font-weight: 800;
  line-height: 1.25;
  color: #1A1A1A;
}
.proof-list {
  display: flex;
  flex-direction: column;
  gap: 40px;
  flex: 1;
}
.proof-item {
  padding-left: 24px;
  border-left: 4px solid #E63946;
}
.proof-text {
  font-size: 42px;
  line-height: 1.5;
  color: #333333;
}
.proof-tag {
  font-weight: 800;
  color: #1A1A1A;
  margin-right: 16px;
}
.footnote-section {
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px solid #D1D1D1;
}
.footnote-text {
  font-size: 34px;
  color: #888888;
  line-height: 1.5;
}
</style>
</head>
<body>
<main class="page page-03 type-estimate">
  <header class="header">
    <span class="icon">💰</span>
    <span class="label">03 / 算账</span>
  </header>
  
  <section class="metric-section">
    <p class="metric-value">747<span class="unit">亿美元</span></p>
    <p class="metric-sub">海外科技巨头AI超额利润保守估算</p>
  </section>

  <section class="title-section">
    <p class="page-title">一本747亿美元的粗账</p>
    <p class="page-title">不丰盛但确实在桌上</p>
  </section>

  <section class="proof-list">
    <div class="proof-item">
      <p class="proof-text"><strong class="proof-tag">切蛋糕</strong>NVIDIA一年多出558亿毛利，加上云厂商超额利润，切20%进缓冲金，折合上千亿人民币。</p>
    </div>
    <div class="proof-item">
      <p class="proof-text"><strong class="proof-tag">不对称</strong>合同有签名和账本，这149亿美元的对公流水里，很多数据贡献者只有免费使用的额度。</p>
    </div>
    <div class="proof-item">
      <p class="proof-text"><strong class="proof-tag">工资条</strong>公司说这是技术带来的效率飞跃，但员工的工资条听不懂，只看到排班表上的班次变少了。</p>
    </div>
  </section>

  <div class="footnote-section">
    <p class="footnote-text">基于NVIDIA、微软、AWS、Google Cloud及Meta财报口径粗算</p>
  </div>
</main>
</body>
</html>
