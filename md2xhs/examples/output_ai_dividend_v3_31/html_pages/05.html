<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-05 {
  width: 1242px;
  height: 1660px;
  box-sizing: border-box;
  background-color: #F8F9FA;
  padding: 100px 100px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: #1A1A1A;
  display: flex;
  flex-direction: column;
}

.header {
  margin-bottom: 80px;
}

.label {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 38px;
  color: #666666;
  font-weight: 500;
}

.title-section {
  margin-bottom: 80px;
}

.page-title {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.title-line {
  font-size: 112px;
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: 0;
  color: #111111;
}

.sub-item-section {
  margin-bottom: 100px;
  background: #FFFFFF;
  padding: 48px;
  border-radius: 16px;
  border-left: 8px solid #111111;
  box-shadow: 0 20px 40px rgba(0,0,0,0.03);
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.sub-tag {
  align-self: flex-start;
  font-size: 38px;
  font-weight: 700;
  color: #FFFFFF;
  background-color: #111111;
  padding: 8px 24px;
  border-radius: 8px;
}

.sub-text {
  font-size: 42px;
  line-height: 1.6;
  color: #333333;
  margin: 0;
}

.steps-section {
  display: flex;
  flex-direction: column;
  gap: 40px;
  flex: 1;
}

.step-item {
  display: flex;
  align-items: flex-start;
  gap: 40px;
  padding-bottom: 40px;
  border-bottom: 2px solid #E5E5E5;
}

.step-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.step-number {
  font-size: 64px;
  font-weight: 900;
  color: #999999;
  line-height: 1;
  padding-top: 6px;
}

.step-content {
  flex: 1;
}

.step-text {
  font-size: 44px;
  line-height: 1.5;
  color: #444444;
  margin: 0;
  font-weight: 500;
}

.step-text strong {
  font-weight: 800;
  color: #111111;
}
</style>
</head>
<body>
<main class="page page-05 type-flow">
  <header class="header">
    <div class="label">
      <span class="icon">⚙️</span>
      <span class="label-text">05 / 流程</span>
    </div>
  </header>
  
  <section class="title-section">
    <div class="page-title">
      <span class="title-line">如果账算得通</span>
      <span class="title-line">我们下一步做什么</span>
    </div>
  </section>

  <section class="sub-item-section">
    <div class="sub-item">
      <span class="sub-tag">清算</span>
      <p class="sub-text">这不是政策宣讲，而是真实的结算单。如果这笔账能活过评论区，下一步的动作才算站得住脚。</p>
    </div>
  </section>

  <section class="steps-section">
    <div class="step-item">
      <div class="step-number">01</div>
      <div class="step-content">
        <p class="step-text"><strong>做公开表格：</strong>把中美大厂利润的细账拆开，一笔笔对齐口径。</p>
      </div>
    </div>
    <div class="step-item">
      <div class="step-number">02</div>
      <div class="step-content">
        <p class="step-text"><strong>盘点岗位案例：</strong>按行业收集被算法改过的报价单和排班表。</p>
      </div>
    </div>
    <div class="step-item">
      <div class="step-number">03</div>
      <div class="step-content">
        <p class="step-text"><strong>找专业人看草案：</strong>拉财税和法律的人下场，把分账逻辑写进普通人的账单里。</p>
      </div>
    </div>
  </section>
</main>
</body>
</html>
