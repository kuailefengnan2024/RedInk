<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-03 {
  width: 1242px;
  height: 1660px;
  background-color: #F8F9FA;
  box-sizing: border-box;
  padding: 104px 96px;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: #1A1A1A;
}

.header {
  display: flex;
  align-items: center;
  font-size: 40px;
  color: #666666;
  font-weight: 500;
  margin-bottom: 56px;
}

.header-icon {
  margin-right: 16px;
  font-size: 44px;
}

.page-title {
  font-size: 124px;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 64px;
  letter-spacing: 0;
  color: #1A1A1A;
}

.page-title p {
  margin: 0;
}

.highlight-box {
  background-color: #FFFFFF;
  border-radius: 16px;
  padding: 40px 48px;
  margin-bottom: 64px;
  border-left: 12px solid #1A56DB;
  box-shadow: 0 16px 40px rgba(26, 86, 219, 0.06);
}

.highlight-sub {
  font-size: 40px;
  color: #666666;
  margin-bottom: 12px;
  font-weight: 500;
}

.highlight-main {
  font-size: 104px;
  font-weight: 900;
  color: #1A56DB;
  line-height: 1.1;
  letter-spacing: 0;
}

.proof-list {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.proof-item {
  display: flex;
  align-items: flex-start;
  gap: 24px;
}

.proof-tag {
  flex-shrink: 0;
  background-color: #EBF1FF;
  color: #1A56DB;
  font-size: 38px;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: 600;
  line-height: 1;
  margin-top: 6px;
}

.proof-text {
  font-size: 42px;
  line-height: 1.55;
  color: #333333;
  font-weight: 400;
}

.footnote {
  margin-top: auto;
  font-size: 36px;
  color: #999999;
  border-top: 2px solid #E5E5E5;
  padding-top: 32px;
  line-height: 1.4;
}
</style>
</head>
<body>
<main class="page page-03 type-estimate">
  <header class="header">
    <span class="header-icon">📊</span>
    <span class="header-label">03 / 国内账本</span>
  </header>
  
  <section class="page-title">
    <p>国内的账类似</p>
    <p>只是更隐蔽</p>
  </section>

  <section class="highlight-box">
    <div class="highlight-sub">国内大厂AI超额利润区间</div>
    <div class="highlight-main">160-333 亿元</div>
  </section>

  <section class="proof-list">
    <div class="proof-item">
      <span class="proof-tag">隐蔽</span>
      <span class="proof-text">大厂都在AI链条上，但超额利润没单拆。阿里云算20到30亿，腾讯广告多赚25到28亿，账单都在财报里。</span>
    </div>
    <div class="proof-item">
      <span class="proof-tag">缓冲</span>
      <span class="proof-text">抽20%做资金池，约32到67亿。数不大，但这笔钱能给被砍预算的初级岗位买点排班时间。</span>
    </div>
    <div class="proof-item">
      <span class="proof-tag">盲区</span>
      <span class="proof-text">账本的底牌不在分钱比例，在于假装没这笔账。利润进了企业账户，用户只收到服务涨价通知。</span>
    </div>
  </section>

  <div class="footnote">
    阿里云/腾讯/百度/华为等保守估算
  </div>
</main>
</body>
</html>
