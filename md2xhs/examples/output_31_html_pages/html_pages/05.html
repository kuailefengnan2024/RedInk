<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-05 {
  background-color: #F7F8FA;
  width: 1242px;
  height: 1660px;
  box-sizing: border-box;
  padding: 100px 96px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
  letter-spacing: 0;
}

.header {
  display: flex;
  flex-direction: column;
}

.label {
  font-size: 40px;
  color: #666;
  font-weight: 600;
}

.title {
  font-size: 132px;
  font-weight: 900;
  color: #111;
  margin-top: 24px;
  line-height: 1.1;
}

.sub-item {
  margin-top: 80px;
  padding: 40px 48px;
  border: 3px dashed #0052FF;
  background-color: #F0F5FF;
  border-radius: 16px;
  position: relative;
}

.sub-tag {
  position: absolute;
  top: -28px;
  left: 40px;
  background: #0052FF;
  color: #FFF;
  font-size: 36px;
  font-weight: 800;
  padding: 12px 24px;
  border-radius: 8px;
  line-height: 1;
}

.sub-text {
  font-size: 44px;
  color: #111;
  line-height: 1.6;
  font-weight: 600;
  margin: 0;
}

.steps-container {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  gap: 36px;
}

.step-item {
  display: flex;
  align-items: center;
  gap: 36px;
  background: #FFFFFF;
  padding: 48px 40px;
  border-radius: 16px;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.03);
}

.step-num {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 64px;
  font-weight: 900;
  color: #0052FF;
  line-height: 1;
  flex-shrink: 0;
  background: #F0F5FF;
  padding: 16px 20px;
  border-radius: 12px;
}

.step-content {
  flex-grow: 1;
}

.step-text {
  font-size: 42px;
  color: #444;
  line-height: 1.6;
  margin: 0;
}

.step-text strong {
  color: #111;
  font-size: 44px;
  font-weight: 800;
}
</style>
</head>
<body>
<main class="page page-05 type-flow">
  <header class="header">
    <span class="label">05 / 路径 ➡️</span>
    <div class="title">把账算清楚</div>
  </header>
  
  <section class="sub-item">
    <div class="sub-tag">总判断</div>
    <p class="sub-text">这事不是喊口号，而是个会计问题。钱从哪来，进哪个账户，谁少拿了一笔。</p>
  </section>

  <section class="steps-container">
    <div class="step-item">
      <div class="step-num">01</div>
      <div class="step-content">
        <p class="step-text"><strong>确认来源：</strong>AI公司的超额利润，算清楚哪部分来自公共数据。</p>
      </div>
    </div>
    <div class="step-item">
      <div class="step-num">02</div>
      <div class="step-content">
        <p class="step-text"><strong>建立账户：</strong>一个独立的公共池，用来存放这笔钱，账目公开。</p>
      </div>
    </div>
    <div class="step-item">
      <div class="step-num">03</div>
      <div class="step-content">
        <p class="step-text"><strong>记录分红：</strong>定期结算，就像公司给股东分红，给数据贡献者记上一笔。</p>
      </div>
    </div>
  </section>
</main>
</body>
</html>
