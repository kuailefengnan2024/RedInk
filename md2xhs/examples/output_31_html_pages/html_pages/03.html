<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page { width: 1242px; height: 1660px; box-sizing: border-box; background-color: #FAFAFA; padding: 90px; display: flex; flex-direction: column; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; position: relative; color: #111111; } .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; border-bottom: 4px solid #111111; padding-bottom: 24px; } .page-label { font-size: 42px; font-weight: 800; color: #111111; } .page-icon { font-size: 46px; } .page-content { flex: 1; display: flex; flex-direction: column; } .page-title { font-size: 110px; font-weight: 900; line-height: 1.2; margin-bottom: 50px; color: #111111; } .metric-wrapper { background-color: #FFFFFF; border-radius: 16px; padding: 50px; margin-bottom: 60px; border-left: 16px solid #FF3B30; box-shadow: 0 20px 40px rgba(0,0,0,0.04); } .metric-value { font-size: 140px; font-weight: 900; color: #FF3B30; margin-bottom: 24px; line-height: 1; } .metric-sub { font-size: 42px; font-weight: 700; color: #666666; } .proof-list { display: flex; flex-direction: column; gap: 40px; } .proof-item { display: flex; flex-direction: column; gap: 16px; } .proof-tag { display: inline-flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 800; color: #111111; background-color: #EEEEEE; padding: 8px 24px; border-radius: 8px; align-self: flex-start; } .proof-text { font-size: 42px; line-height: 1.5; color: #333333; font-weight: 500; } .page-footnote { position: absolute; bottom: 90px; left: 90px; right: 90px; font-size: 38px; color: #888888; border-top: 2px solid #DDDDDD; padding-top: 24px; font-weight: 500; }
</style>
</head>
<body>
<main class="page page-03 type-estimate">
  <header class="page-header">
    <span class="page-label">03 / 算账</span>
    <span class="page-icon">💰</span>
  </header>
  
  <section class="page-content">
    <div class="page-title">一笔隐形收入</div>
    
    <div class="metric-wrapper">
      <div class="metric-value">¥ 2000 亿</div>
      <div class="metric-sub">每年 / 公共池规模</div>
    </div>
    
    <div class="proof-list">
      <div class="proof-item">
        <div class="proof-tag">口径</div>
        <div class="proof-text">只看头部几家科技公司的AI相关利润，刨去研发和运营成本，剩下的超额部分。</div>
      </div>
      <div class="proof-item">
        <div class="proof-tag">对照</div>
        <div class="proof-text">这笔钱如果能进公共账户，体量接近一个中等国家的年度财政预算，或者够给全球网民每人买杯咖啡。</div>
      </div>
      <div class="proof-item">
        <div class="proof-tag">性质</div>
        <div class="proof-text">这不是补贴。这是你作为生产资料（数据）所有者，开出的一张账单。</div>
      </div>
    </div>
  </section>
  
  <div class="page-footnote">
    数据为讨论量级示意，非精确财报数字
  </div>
</main>
</body>
</html>
