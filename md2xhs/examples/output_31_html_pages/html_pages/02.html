<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-02 {
  width: 1242px;
  height: 1660px;
  background-color: #FFFFFF;
  padding: 112px 100px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 80px;
}

.header-icon {
  font-size: 44px;
}

.header-label {
  font-size: 38px;
  color: #888888;
  font-weight: 500;
}

.hero-title-wrapper {
  margin-bottom: 80px;
}

.hero-title {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin: 0;
}

.hero-title span {
  font-size: 112px;
  font-weight: 600;
  color: #111111;
  line-height: 1.1;
}

.hero-title strong {
  font-size: 148px;
  font-weight: 900;
  color: #D92D20;
  line-height: 1.1;
}

.proof-list {
  display: flex;
  flex-direction: column;
  flex: 1;
  justify-content: center;
}

.proof-item {
  border-top: 2px solid #E5E5E5;
  padding: 48px 0;
  display: flex;
  gap: 48px;
  align-items: flex-start;
}

.proof-item:last-child {
  border-bottom: 2px solid #E5E5E5;
}

.proof-tag {
  flex-shrink: 0;
  width: 200px;
  font-size: 34px;
  font-weight: 600;
  color: #D92D20;
  background-color: #FFF2F1;
  border: 2px solid #FCDAD7;
  padding: 12px 0;
  border-radius: 12px;
  text-align: center;
  box-sizing: border-box;
}

.proof-text {
  flex: 1;
  font-size: 42px;
  line-height: 1.6;
  color: #222222;
  margin: 0;
  font-weight: 400;
}
</style>
</head>
<body>
<main class="page page-02 type-hero">
  <header class="page-header">
    <span class="header-icon">💸</span>
    <span class="header-label">02 / 核心</span>
  </header>
  <section class="hero-title-wrapper">
    <p class="hero-title">
      <span>AI 欠每个网民</span>
      <strong>一张工资条</strong>
    </p>
  </section>
  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">技能替代</div>
      <p class="proof-text">模型学会了你的绘画风格，下一步不是署名感谢，是接手你的稿件订单，并报出更低的价格。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">岗位预算</div>
      <p class="proof-text">一个AI客服席位，比一个员工的五险一金便宜。客服、翻译、初级设计的岗位消失，先是为了财报好看。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">价值错配</div>
      <p class="proof-text">三天的设计初稿，AI三分钟出图。省下来的不是工时，是这个岗位的年度预算。</p>
    </div>
  </section>
</main>
</body>
</html>
