<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-01 { width: 1242px; height: 1660px; box-sizing: border-box; padding: 100px; background-color: #F4F4F6; display: flex; flex-direction: column; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; overflow: hidden; } .page-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 40px; border-bottom: 4px solid #111111; margin-bottom: 120px; } .header-label { font-size: 40px; font-weight: 700; color: #111111; letter-spacing: 0; } .header-icon { font-size: 40px; font-weight: 900; color: #F4F4F6; background: #FF3B30; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 12px; } .title-section { display: flex; flex-direction: column; } .page-title { display: flex; flex-direction: column; gap: 32px; } .title-line1 { font-size: 152px; font-weight: 900; color: #111111; line-height: 1.1; letter-spacing: 0; } .title-line2 { font-size: 152px; font-weight: 900; color: #FF3B30; line-height: 1.1; letter-spacing: 0; } .proof-list { margin-top: auto; display: flex; flex-direction: column; } .proof-item { display: flex; flex-direction: row; gap: 48px; padding: 56px 0; border-top: 2px solid #D1D1D6; } .proof-item:last-child { border-bottom: 2px solid #D1D1D6; } .proof-tag { font-size: 36px; font-weight: 800; color: #FF3B30; flex-shrink: 0; width: 140px; line-height: 1.65; letter-spacing: 0; } .proof-text { font-size: 42px; color: #333333; line-height: 1.65; font-weight: 400; letter-spacing: 0; }
</style>
</head>
<body>
<main class="page page-01 type-cover">
  <header class="page-header">
    <div class="header-label">01 / 封面</div>
    <div class="header-icon">!</div>
  </header>
  <section class="title-section">
    <div class="page-title">
      <div class="title-line1">你的数据</div>
      <div class="title-line2">别人的年报</div>
    </div>
  </section>
  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">喂养</div>
      <div class="proof-text">AI的燃料，是你我过去20年发的每张自拍、每句评论、每一行开源代码。它不是凭空变聪明的。</div>
    </div>
    <div class="proof-item">
      <div class="proof-tag">账单</div>
      <div class="proof-text">科技公司挖石油，至少会付钱给地主。数据公司只给你一份日渐变长的用户协议，和一张涨了价的会员账单。</div>
    </div>
  </section>
</main>
</body>
</html>
