<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body, h1, h2, h3, h4, h5, h6, p, ul, ol, li { margin: 0; padding: 0; }
html, body { width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
.page {
  box-sizing: border-box;
  width: 1242px;
  height: 1660px;
  overflow: hidden;
  position: relative;
  padding: 100px !important;
  display: flex !important;
  flex-direction: column !important;
}
h1, h2, h3, h4, h5, h6, p, span, li, div {
  text-wrap: pretty;
}
.page-title, h1, h2, h3, h4, h5, h6 {
  text-wrap: balance;
}
.system-page-label {
  font-size: 38px;
  font-weight: 600;
  color: #888888;
  margin-bottom: 48px;
  text-align: left;
  width: 100%;
  font-family: system-ui, -apple-system, sans-serif;
  letter-spacing: 0;
}

/* This is a global CSS block, but for this specific page, all styles are self-contained. */
.page {
    background-color: #F2F4F7;
    padding: 100px;
    box-sizing: border-box;
    justify-content: flex-start;
    gap: 20px;
}
.title-wrapper {
    text-align: center;
    width: 100%;
}
.page-title {
    font-size: 112px;
    font-weight: 800;
    color: #111111;
    line-height: 1.2;
    margin: 0;
}
.page-subtitle {
    font-size: 84px;
    font-weight: 800;
    color: #555555;
    line-height: 1.2;
    margin: 4px 0 0 0;
}
.metric-wrapper {
    text-align: center;
    margin: 8px 0;
}
.metric-highlight {
    font-size: 156px;
    font-weight: 900;
    color: #E53935;
    margin: 0;
    line-height: 1;
    letter-spacing: 0;
}
.metric-sub {
    font-size: 38px;
    color: #555555;
    margin: 8px 0 0 0;
    font-weight: 500;
    letter-spacing: 0;
}
.content-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
}
.content-item {
    background-color: #FFFFFF;
    border-radius: 16px;
    padding: 24px 48px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.03);
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.content-tag {
    font-size: 34px;
    font-weight: 600;
    color: #FFFFFF;
    background-color: #111111;
    padding: 6px 16px;
    border-radius: 8px;
    margin: 0;
    align-self: flex-start;
}
.content-text {
    font-size: 40px;
    line-height: 1.6;
    color: #111111;
    margin: 0;
    text-wrap: pretty;
}
.footnote {
    margin-top: auto;
    font-size: 36px;
    color: #555555;
    line-height: 1.6;
    text-align: center;
    padding: 0 40px;
    text-wrap: pretty;
}
</style>
</head>
<body>
<main class="page page-04 type-estimate">
  <div class="system-page-label">03</div>
    <div class="title-wrapper">
        <p class="page-title">国内也是<br>类似的账</p>
        <p class="page-subtitle">只是更难看清</p>
    </div>
    <div class="metric-wrapper">
        <p class="metric-highlight">160-333亿</p>
        <p class="metric-sub">人民币 / <span style="white-space: nowrap;">讨论量级</span></p>
    </div>
    <ul class="content-list">
        <li class="content-item">
            <p class="content-tag">模糊</p>
            <p class="content-text">巨头都在AI链条里，但超额利润没单独拆出来。只能先估算，合计大概160到<span style="white-space: nowrap;">333亿元。</span></p>
        </li>
        <li class="content-item">
            <p class="content-tag">装睡</p>
            <p class="content-text">按20%算公共数据红利，是32到<span style="white-space: nowrap;">67亿元。</span>数不大。但数不大和账不存在是两回事。前者是早期，后者是装睡。</p>
        </li>
        <li class="content-item">
            <p class="content-tag">代价</p>
            <p class="content-text">国内的就业压力不是凭空的。ILO把AI影响拆到任务层面，它不一定让职业消失，它只改变工资单的厚度。</p>
        </li>
    </ul>
    <p class="footnote">中美两国 AI 超额收益均在持续增长。然而，作为技术养料供给者的普通民众，其工作机会却在被 AI <span style="white-space: nowrap;">悄然夺走。</span></p>
</main>
<script>
(function() {
    const page = document.querySelector('.page');
    if (!page) return;
    
    // Ensure the page root itself is exactly fixed size
    page.style.width = '1242px';
    page.style.height = '1660px';
    page.style.boxSizing = 'border-box';
    page.style.overflow = 'hidden';
    page.style.position = 'relative';
    page.style.display = 'flex';
    page.style.flexDirection = 'column';
    
    const clientHeight = 1660;
    
    // 1. Gather elements to scale spacing
    const elementsWithSpacing = Array.from(page.querySelectorAll('*')).concat([page]);
    const spacingData = [];
    elementsWithSpacing.forEach(el => {
        const style = window.getComputedStyle(el);
        const data = {
            el: el,
            paddingTop: parseFloat(style.paddingTop) || 0,
            paddingBottom: parseFloat(style.paddingBottom) || 0,
            marginTop: parseFloat(style.marginTop) || 0,
            marginBottom: parseFloat(style.marginBottom) || 0,
            gap: parseFloat(style.gap) || 0
        };
        if (data.paddingTop || data.paddingBottom || data.marginTop || data.marginBottom || data.gap) {
            spacingData.push(data);
        }
    });

    // 2. Shrink spacing first (gaps, margins, card paddings)
    let spacingScale = 1.0;
    const minSpacingScale = 0.3;
    while (page.scrollHeight > clientHeight && spacingScale > minSpacingScale) {
        spacingScale -= 0.05;
        spacingData.forEach(data => {
            if (data.el === page) {
                // Keep some padding for safety boundary
                const newPT = Math.max(60, data.paddingTop * spacingScale);
                const newPB = Math.max(60, data.paddingBottom * spacingScale);
                data.el.style.paddingTop = newPT + 'px';
                data.el.style.paddingBottom = newPB + 'px';
            } else {
                if (data.paddingTop) data.el.style.paddingTop = (data.paddingTop * spacingScale) + 'px';
                if (data.paddingBottom) data.el.style.paddingBottom = (data.paddingBottom * spacingScale) + 'px';
                if (data.marginTop) data.el.style.marginTop = (data.marginTop * spacingScale) + 'px';
                if (data.marginBottom) data.el.style.marginBottom = (data.marginBottom * spacingScale) + 'px';
                if (data.gap) data.el.style.gap = (data.gap * spacingScale) + 'px';
            }
        });
    }

    // 3. If still overflowing, shrink font sizes as a last resort
    if (page.scrollHeight > clientHeight) {
        const elementsToScale = Array.from(page.querySelectorAll('*')).filter(el => {
            if (el === page || el.classList.contains('system-page-label')) return false;
            const style = window.getComputedStyle(el);
            return parseFloat(style.fontSize) > 0;
        });
        
        elementsToScale.forEach(el => {
            const style = window.getComputedStyle(el);
            el.dataset.origFontSize = parseFloat(style.fontSize);
            const lh = style.lineHeight;
            if (lh.endsWith('px')) {
                el.dataset.origLineHeight = parseFloat(lh);
            }
        });

        let fontScale = 1.0;
        const minFontScale = 0.5;
        while (page.scrollHeight > clientHeight && fontScale > minFontScale) {
            fontScale -= 0.02;
            elementsToScale.forEach(el => {
                el.style.fontSize = (parseFloat(el.dataset.origFontSize) * fontScale) + 'px';
                if (el.dataset.origLineHeight) {
                    el.style.lineHeight = (parseFloat(el.dataset.origLineHeight) * fontScale) + 'px';
                }
            });
        }
    }
})();
</script>
</body>
</html>
