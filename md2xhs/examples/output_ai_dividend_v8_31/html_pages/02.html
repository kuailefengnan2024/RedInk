<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page {
  width: 1242px;
  height: 1660px;
  background-color: #F8F9FA;
  padding: 100px 96px;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
  display: flex;
  flex-direction: column;
}
.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}
.header-icon {
  font-size: 40px;
}
.header-label {
  font-size: 36px;
  font-weight: 600;
  color: #666666;
  letter-spacing: 0;
}
.page-title {
  margin-bottom: 56px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.title-line {
  font-size: 110px;
  font-weight: 900;
  color: #111111;
  line-height: 1.15;
  letter-spacing: 0;
}
.proof-list {
  display: flex;
  flex-direction: column;
  gap: 28px;
  flex: 1;
}
.proof-item {
  background-color: #FFFFFF;
  border-radius: 16px;
  padding: 36px 40px;
  border-left: 8px solid #FF4D00;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.proof-tag {
  font-size: 42px;
  font-weight: 800;
  color: #FF4D00;
}
.proof-text {
  font-size: 38px;
  line-height: 1.5;
  color: #333333;
  font-weight: 400;
}
</style>
</head>
<body>
<main class="page page-02 type-body">
  <header class="page-header">
    <span class="header-icon">📉</span>
    <span class="header-label">02 / 预算</span>
  </header>
  <section class="page-title">
    <div class="title-line">公司多赚了</div>
    <div class="title-line">招聘先少了</div>
  </section>
  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">冻结招聘</div>
      <div class="proof-text">纽约联储的企业调查写得委婉，公司很少直接裁员，只是调整招聘计划。失业率还没爆，招聘软件上的已读不回先变多了。</div>
    </div>
    <div class="proof-item">
      <div class="proof-tag">入口变窄</div>
      <div class="proof-text">斯坦福AI指数显示，系统主要堵死了年轻人的招聘入口。过去两年，22到25岁的软件开发者，就业机会少了快20%。</div>
    </div>
    <div class="proof-item">
      <div class="proof-tag">预算转移</div>
      <div class="proof-text">Challenger 2026年数据显示，单是4月就有超两万个岗位因为AI没了预算。客服、运营和初级设计先被压预算，排班表先瘦了。</div>
    </div>
  </section>
</main>
</body>
</html>
