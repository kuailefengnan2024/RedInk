<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-04 {
  width: 1242px;
  height: 1660px;
  box-sizing: border-box;
  background-color: #f7f9f8;
  padding: 90px 100px;
  position: relative;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: #111;
  letter-spacing: 0;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 38px;
  font-weight: 600;
  color: #666;
}

.title-section {
  margin-top: 60px;
  margin-bottom: 60px;
}

.title-line {
  font-size: 104px;
  font-weight: 900;
  line-height: 1.25;
  color: #111;
}

.highlight-section {
  background-color: #1a3a30;
  color: #fff;
  padding: 50px 60px;
  border-radius: 16px;
  margin-bottom: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.highlight-value {
  font-size: 100px;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 16px;
}

.highlight-sub {
  font-size: 38px;
  font-weight: 400;
  opacity: 0.85;
}

.sub-items-section {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-left: 24px;
  border-left: 6px solid #1a3a30;
}

.sub-tag {
  font-size: 42px;
  font-weight: 700;
  color: #1a3a30;
}

.sub-text {
  font-size: 38px;
  font-weight: 400;
  color: #333;
  line-height: 1.55;
}

.footnote-section {
  position: absolute;
  bottom: 90px;
  right: 100px;
  font-size: 32px;
  color: #999;
  font-weight: 400;
}
</style>
</head>
<body>
<main class="page page-04 type-estimate">
  <header class="page-header">
    <span class="icon">🧮</span>
    <span class="label">04 / 国内</span>
  </header>
  
  <section class="title-section">
    <div class="title-line">国内多赚的钱</div>
    <div class="title-line">算得更隐蔽</div>
  </section>

  <section class="highlight-section">
    <div class="highlight-value">160-333亿元</div>
    <div class="highlight-sub">国内AI超额利润区间</div>
  </section>

  <section class="sub-items-section">
    <div class="sub-item">
      <div class="sub-tag">大厂增量</div>
      <div class="sub-text">阿里云算20到30亿，腾讯广告增量算25到28亿，百度云加应用算15到25亿。大厂很少把AI超额利润单独列出来，只能粗算。</div>
    </div>
    <div class="sub-item">
      <div class="sub-tag">保守估计</div>
      <div class="sub-text">加上华为、字节和其他公司，保守给个100到250亿的区间。加起来国内AI超额利润大概在160到333亿元。</div>
    </div>
    <div class="sub-item">
      <div class="sub-tag">缓冲金</div>
      <div class="sub-text">按20%算公共缓冲金，大概32到67亿元。这笔钱不大，但钱少和账本空白是两码事。前者是业务刚起步，后者是装睡。</div>
    </div>
  </section>

  <div class="footnote-section">讨论量级 / 示意</div>
</main>
</body>
</html>
