<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page { width: 1242px; height: 1660px; background-color: #F7F7F5; box-sizing: border-box; padding: 110px 100px; display: flex; flex-direction: column; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; position: relative; overflow: hidden; } .page-header { display: flex; align-items: center; gap: 16px; } .header-icon { font-size: 42px; } .header-label { font-size: 34px; font-weight: 600; color: #888888; letter-spacing: 0; } .title-section { margin-top: 150px; display: flex; flex-direction: column; gap: 12px; } .page-title { font-size: 144px; font-weight: 900; line-height: 1.15; color: #111111; margin: 0; letter-spacing: 0; } .sub-items-section { margin-top: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 48px; } .sub-item { border-top: 2px solid #E0E0DE; padding-top: 36px; display: flex; flex-direction: row; gap: 40px; } .sub-tag { width: 180px; flex-shrink: 0; font-size: 36px; font-weight: 700; color: #D23A27; letter-spacing: 0; line-height: 1.5; } .sub-text { flex: 1; font-size: 40px; line-height: 1.6; color: #333333; margin: 0; font-weight: 400; letter-spacing: 0; text-align: justify; }
</style>
</head>
<body>
<main class="page page-01 type-cover">
  <header class="page-header">
    <span class="header-icon">🧾</span>
    <span class="header-label">01 / 账单</span>
  </header>
  <section class="title-section">
    <p class="page-title">AI多赚的钱</p>
    <p class="page-title">谁少了机会</p>
  </section>
  <section class="sub-items-section">
    <div class="sub-item">
      <div class="sub-tag">财报体面</div>
      <p class="sub-text">英伟达和微软把算力变成连涨的收入，利润表很体面。但另一边，初级岗位的预算悄悄缩水，外包单价被压低。</p>
    </div>
    <div class="sub-item">
      <div class="sub-tag">账本空白</div>
      <p class="sub-text">系统赚的钱进了公司账户，代价却在统计口径之外。这笔钱很大，但没人问它从哪来，也没人算它该怎么分。</p>
    </div>
  </section>
</main>
</body>
</html>
