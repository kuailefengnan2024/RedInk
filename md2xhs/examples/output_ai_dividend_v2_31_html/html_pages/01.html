<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page { width: 1242px; height: 1660px; background-color: #0F0F0F; color: #FFFFFF; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; box-sizing: border-box; padding: 110px 100px; display: flex; flex-direction: column; position: relative; } .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 140px; } .header-icon { font-size: 52px; } .header-label { font-size: 40px; color: #888888; font-weight: 500; letter-spacing: 0; } .title-section { flex: 1; display: flex; flex-direction: column; } .page-title { display: flex; flex-direction: column; gap: 32px; } .page-title p { font-size: 144px; font-weight: 900; line-height: 1.15; margin: 0; letter-spacing: 0; } .highlight-title { color: #FF453A; } .sub-items-section { display: flex; flex-direction: column; gap: 60px; border-top: 2px solid #2A2A2A; padding-top: 80px; margin-bottom: 40px; } .sub-item { display: flex; flex-direction: row; align-items: flex-start; gap: 40px; } .sub-item-tag { font-size: 34px; color: #FF453A; border: 2px solid #FF453A; border-radius: 12px; padding: 10px 20px; font-weight: 600; letter-spacing: 0; flex-shrink: 0; margin-top: 6px; } .sub-item-text { font-size: 42px; line-height: 1.6; color: #D1D1D1; margin: 0; letter-spacing: 0; }
</style>
</head>
<body>
<main class="page page-01 type-cover">
  <header class="page-header">
    <span class="header-icon">🧾</span>
    <span class="header-label">01 / 封面</span>
  </header>
  <section class="title-section">
    <div class="page-title">
      <p>你喂饱了 AI</p>
      <p class="highlight-title">AI 却没给你发工资</p>
    </div>
  </section>
  <section class="sub-items-section">
    <div class="sub-item">
      <div class="sub-item-tag">账本</div>
      <p class="sub-item-text">数据来自用户，收入进公司账户，普通人只收到一份更长的隐私协议弹窗。</p>
    </div>
    <div class="sub-item">
      <div class="sub-item-tag">喂养</div>
      <p class="sub-item-text">你的自拍、代码和聊天记录换了个马甲叫训练数据。词变高级了，工资条上的余额没变。</p>
    </div>
  </section>
</main>
</body>
</html>
