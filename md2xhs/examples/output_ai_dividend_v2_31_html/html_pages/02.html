<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-02 {
  width: 1242px;
  height: 1660px;
  background-color: #F7F8FA;
  box-sizing: border-box;
  padding: 88px 96px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 56px;
}

.header-icon {
  font-size: 44px;
}

.header-label {
  font-size: 40px;
  font-weight: 600;
  color: #555555;
  letter-spacing: 0;
}

.page-title {
  margin-bottom: 64px;
}

.page-title p {
  margin: 0;
  font-size: 104px;
  font-weight: 900;
  line-height: 1.25;
  color: #1A1A1A;
  letter-spacing: 0;
}

.page-title p:last-child {
  color: #D32F2F;
}

.proof-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  flex: 1;
}

.proof-card {
  background-color: #FFFFFF;
  border-radius: 16px;
  padding: 32px 40px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03);
  display: flex;
  flex-direction: column;
  gap: 12px;
  border-left: 8px solid #D32F2F;
}

.proof-tag {
  font-size: 42px;
  font-weight: 800;
  color: #1A1A1A;
  letter-spacing: 0;
}

.proof-text {
  margin: 0;
  font-size: 38px;
  line-height: 1.55;
  color: #555555;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-02 type-body">
  <header class="page-header">
    <span class="header-icon">📉</span>
    <span class="header-label">02 / 岗位代价</span>
  </header>
  
  <section class="page-title">
    <p>岗位不会明天消失</p>
    <p>只是先被重新报价</p>
  </section>

  <section class="proof-list">
    <div class="proof-card">
      <div class="proof-tag">客服</div>
      <p class="proof-text">聊天记录喂熟了自动回复。人还没走，排班表先瘦了，公司账户里省下了一笔人头费。</p>
    </div>
    <div class="proof-card">
      <div class="proof-tag">设计</div>
      <p class="proof-text">你的三张参考图换来它三分钟出图。省下的不是时间，是外包预算和你的设计稿结款单。</p>
    </div>
    <div class="proof-card">
      <div class="proof-tag">程序员</div>
      <p class="proof-text">报错记录养出了代码助手。它在弹窗里补全代码，HR在工资条上顺手补全降薪报价。</p>
    </div>
    <div class="proof-card">
      <div class="proof-tag">翻译</div>
      <p class="proof-text">字幕组熬夜翻的稿子变成了免费外语插件。模型学会了技能，下一步不是感谢，是合同上的低价。</p>
    </div>
  </section>
</main>
</body>
</html>
