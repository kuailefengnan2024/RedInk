<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-06 {
  width: 1242px;
  height: 1660px;
  background-color: #0A0A0A;
  color: #FFFFFF;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  box-sizing: border-box;
  padding: 100px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.page-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 120px;
}
.header-icon {
  font-size: 48px;
}
.header-label {
  font-size: 40px;
  color: #888888;
  font-weight: 500;
  letter-spacing: 0;
}
.title-section {
  margin-bottom: 120px;
}
.page-title {
  font-size: 132px;
  font-weight: 900;
  line-height: 1.25;
  color: #FFFFFF;
  letter-spacing: 0;
}
.action-section {
  display: flex;
  flex-direction: column;
  gap: 48px;
  flex: 1;
}
.action-item {
  background-color: #1A1A1A;
  border-radius: 16px;
  padding: 64px;
  border-left: 12px solid #FF4500;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.action-item:nth-child(2) {
  border-left-color: #FFD700;
}
.action-tag {
  font-size: 46px;
  font-weight: 800;
  color: #FFFFFF;
  letter-spacing: 0;
}
.action-text {
  font-size: 42px;
  line-height: 1.6;
  color: #CCCCCC;
  margin: 0;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-06 type-cta">
  <header class="page-header">
    <span class="header-icon">👀</span>
    <span class="header-label">06 / 动作</span>
  </header>
  <section class="title-section">
    <div class="page-title">如果你也觉得账不对</div>
  </section>
  <section class="action-section">
    <div class="action-item">
      <div class="action-tag">留证</div>
      <p class="action-text">在评论区留下你被压价的经历或工资条。人够多，我们下一条就把计算表格摊开。</p>
    </div>
    <div class="action-item">
      <div class="action-tag">算账</div>
      <p class="action-text">点个赞让这笔账被更多人看见。追踪后续更新，看看这笔钱到底进哪个账户，谁少拿了一口。</p>
    </div>
  </section>
</main>
</body>
</html>
