<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-04 { width: 1242px; height: 1660px; box-sizing: border-box; padding: 100px; background-color: #F6F5F0; color: #1A1A1A; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; } .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 56px; } .header-icon { font-size: 40px; } .header-label { font-size: 36px; font-weight: 600; color: #666; letter-spacing: 0; } .page-title { margin-bottom: 64px; } .page-title p { font-size: 100px; font-weight: 900; line-height: 1.25; margin: 0; letter-spacing: 0; color: #1A1A1A; } .metric { margin-bottom: 64px; } .metric-value { font-size: 180px; font-weight: 900; color: #D93A26; line-height: 1; display: flex; align-items: baseline; gap: 24px; letter-spacing: 0; } .metric-unit { font-size: 56px; font-weight: 700; color: #1A1A1A; } .proof-list { display: flex; flex-direction: column; gap: 24px; margin-bottom: auto; } .proof-item { background: #FFFFFF; padding: 32px 40px; border-radius: 16px; display: flex; gap: 32px; align-items: flex-start; box-shadow: 0 4px 16px rgba(0,0,0,0.02); } .proof-tag { flex-shrink: 0; width: 130px; font-size: 34px; font-weight: 800; color: #D93A26; background: rgba(217, 58, 38, 0.08); padding: 10px 0; border-radius: 8px; text-align: center; } .proof-text { font-size: 38px; line-height: 1.32; color: #1A1A1A; margin: 0; padding-top: 4px; } .footnote { font-size: 32px; color: #888; line-height: 1.4; margin-top: 40px; border-top: 2px solid #E5E0D8; padding-top: 24px; }
</style>
</head>
<body>
<main class="page page-04 type-estimate">
  <header class="page-header">
    <span class="header-icon">📊</span>
    <span class="header-label">04 / 中国账本</span>
  </header>
  
  <section class="page-title">
    <p>中国公司也在牌桌上</p>
    <p>保守算个底线</p>
  </section>
  
  <section class="metric">
    <div class="metric-value">160-333<span class="metric-unit">亿元</span></div>
  </section>
  
  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">广告</div>
      <p class="proof-text">广告被用户的点击喂准了，多出来的利润以亿计。台面挺空，公司账户挺满。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">云基建</div>
      <p class="proof-text">卖算力和模型基建赚了钱。剧本是一样的，利润流进财报，代价留在普通人的排班表上。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">账单</div>
      <p class="proof-text">抽两成出来大概几十亿元。数字不大，但它打破了一个幻觉：这笔结算账单不是不存在。</p>
    </div>
  </section>
  
  <div class="footnote">讨论量级 / 示意。基于阿里、腾讯、百度等云和广告增量保守估算。</div>
</main>
</body>
</html>
