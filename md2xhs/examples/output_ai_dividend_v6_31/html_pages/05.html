<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-05 { width: 1242px; height: 1660px; box-sizing: border-box; background-color: #F8F9FA; padding: 100px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: #1A1A1A; display: flex; flex-direction: column; } .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; font-size: 38px; font-weight: 600; color: #666666; letter-spacing: 0; } .page-title { margin-bottom: 48px; display: flex; flex-direction: column; gap: 8px; } .title-line { font-size: 100px; font-weight: 900; line-height: 1.2; letter-spacing: 0; color: #1A1A1A; } .proof-list { display: flex; flex-direction: column; gap: 24px; flex: 1; } .proof-item { background-color: #FFFFFF; border-radius: 16px; padding: 32px 40px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.03); display: flex; flex-direction: column; gap: 16px; } .proof-tag { display: inline-block; font-size: 32px; font-weight: 700; color: #D9463E; background-color: rgba(217, 70, 62, 0.1); padding: 8px 20px; border-radius: 8px; align-self: flex-start; letter-spacing: 0; } .proof-text { margin: 0; font-size: 40px; line-height: 1.6; color: #333333; letter-spacing: 0; }
</style>
</head>
<body>
<main class="page page-05 type-body">
  <header class="page-header">
    <span class="label">05 / 代价</span>
    <span class="icon">⏳</span>
  </header>
  <section class="page-title">
    <div class="title-line">三天的初稿变三分钟</div>
    <div class="title-line">然后呢？</div>
  </section>
  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">效率代价</div>
      <p class="proof-text">知识工作者相信AI能提高效率，也担心被替代。三天的初稿变三分钟，省下来的不是时间，是公司账户里的岗位预算。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">会计问题</div>
      <p class="proof-text">效率和焦虑坐在同一张工位，谁也没让谁。这不是灾难预言，灾难预言太省事。这只是个会计问题，需要有人把账算清楚。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">风险外溢</div>
      <p class="proof-text">合同有签名和账本，但很多劳动只有弹窗和协议。利润写进财报，风险留在统计口径外，用户只收到长长的涨价通知。</p>
    </div>
  </section>
</main>
</body>
</html>
