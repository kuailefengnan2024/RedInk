<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page {
  width: 1242px;
  height: 1660px;
  background-color: #fcfcfc;
  box-sizing: border-box;
  padding: 100px 108px;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 70px;
}

.header-icon {
  font-size: 44px;
}

.header-label {
  font-size: 38px;
  font-weight: 700;
  color: #555;
  letter-spacing: 0;
}

.title-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 80px;
}

.page-title {
  font-size: 104px;
  font-weight: 800;
  line-height: 1.15;
  color: #111;
  letter-spacing: 0;
}

.cta-content {
  display: flex;
  flex-direction: column;
  gap: 56px;
}

.cta-item {
  position: relative;
  display: flex;
  flex-direction: column;
  padding-left: 40px;
}

.cta-item::before {
  content: "";
  position: absolute;
  left: 0;
  top: 10px;
  bottom: 0;
  width: 8px;
  background-color: #111;
  border-radius: 4px;
}

.cta-item:nth-child(2)::before {
  background-color: #666;
}

.cta-item:nth-child(3)::before {
  background-color: #aaa;
}

.cta-tag {
  font-size: 38px;
  font-weight: 800;
  color: #111;
  margin-bottom: 16px;
  letter-spacing: 0;
}

.cta-text {
  font-size: 42px;
  line-height: 1.55;
  color: #333;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-06 type-cta">
  <header class="page-header">
    <span class="header-icon">🔍</span>
    <span class="header-label">06 / 验账</span>
  </header>
  
  <section class="title-section">
    <div class="page-title">这笔账算到一半</div>
    <div class="page-title">先看能不能经得起挑错</div>
  </section>
  
  <section class="cta-content">
    <div class="cta-item">
      <div class="cta-tag">验证账本</div>
      <div class="cta-text">如果你觉得算得偏保守，或者所在行业正被AI改价、减岗、外包替代，欢迎在评论区挑错。工资条、外包单价、排班表，比口号有用。</div>
    </div>
    <div class="cta-item">
      <div class="cta-tag">整理案例</div>
      <div class="cta-text">如果账单确实有问题，作者下一步可能公开中美计算表格，把口径写清楚，并收集被影响的岗位案例，不靠情绪凑数。</div>
    </div>
    <div class="cta-item">
      <div class="cta-tag">草案挑错</div>
      <div class="cta-text">之后可能会写一版公共数据红利草案，找人继续挑错。这笔账算到一半，还没按发送键，先看大家怎么对这本账。</div>
    </div>
  </section>
</main>
</body>
</html>
