<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-02 {
  width: 1242px;
  height: 1660px;
  background-color: #F8F9FA;
  box-sizing: border-box;
  padding: 88px 96px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
  color: #111827;
  letter-spacing: 0;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 44px;
}

.header-icon {
  font-size: 40px;
}

.header-label {
  font-size: 36px;
  font-weight: 600;
  color: #6B7280;
}

.page-title {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 56px;
}

.title-line {
  font-size: 104px;
  font-weight: 800;
  line-height: 1.15;
  color: #111827;
}

.title-highlight {
  color: #DC2626;
}

.proof-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.proof-item {
  background-color: #FFFFFF;
  border-radius: 16px;
  padding: 36px 48px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.03);
  border: 1px solid #F3F4F6;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.proof-tag {
  align-self: flex-start;
  font-size: 34px;
  font-weight: 700;
  color: #DC2626;
  background-color: #FEF2F2;
  padding: 8px 16px;
  border-radius: 8px;
}

.proof-text {
  font-size: 40px;
  line-height: 1.5;
  color: #374151;
  margin: 0;
  font-weight: 400;
}
</style>
</head>
<body>
<main class="page page-02 type-body">
  <header class="page-header">
    <span class="header-icon">📉</span>
    <span class="header-label">02 / 就业表</span>
  </header>
  
  <section class="page-title">
    <div class="title-line">失业率还没爆</div>
    <div class="title-line title-highlight">招聘入口先变窄了</div>
  </section>

  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">裁员主因</div>
      <p class="proof-text">Challenger 2026年4月数据显示，21490个裁员计划因为AI，占了26%。系统没改变命运，它只是先改了招聘计划。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">预算变薄</div>
      <p class="proof-text">Stanford AI Index 2026的口径更冷：22到25岁软件开发者就业两年降了近20%。结果还没公布，初级岗位预算已经先变薄。</p>
    </div>
    <div class="proof-item">
      <div class="proof-tag">结构调整</div>
      <p class="proof-text">企业很少承认因为AI大规模裁员，他们管这叫“调整岗位结构”。不是效率提升，是岗位预算换了个新名字，排班表先瘦了下来。</p>
    </div>
  </section>
</main>
</body>
</html>
