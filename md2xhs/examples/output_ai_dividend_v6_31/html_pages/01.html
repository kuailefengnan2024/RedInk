<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-cover {
  box-sizing: border-box;
  width: 1242px;
  height: 1660px;
  background-color: #F7F7F8;
  background-image: 
    linear-gradient(rgba(26,26,26,0.04) 2px, transparent 2px),
    linear-gradient(90deg, rgba(26,26,26,0.04) 2px, transparent 2px);
  background-size: 48px 48px;
  background-position: -2px -2px;
  border: 20px solid #1A1A1A;
  padding: 88px 96px;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}

.page-header {
  display: inline-flex;
  align-items: center;
  align-self: flex-start;
  gap: 16px;
  background-color: #1A1A1A;
  padding: 12px 28px 12px 20px;
  border-radius: 100px;
}

.header-icon {
  font-size: 40px;
}

.header-label {
  font-size: 36px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: 0;
}

.cover-title {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 100px;
  margin-bottom: auto;
}

.title-line {
  font-size: 120px;
  font-weight: 900;
  line-height: 1.2;
  color: #1A1A1A;
  margin: 0;
  letter-spacing: 0;
}

.title-line-2 {
  color: #D92525;
}

.sub-items {
  display: flex;
  flex-direction: column;
  gap: 56px;
  border-top: 6px solid #1A1A1A;
  padding-top: 56px;
  margin-bottom: 24px;
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.sub-tag {
  align-self: flex-start;
  font-size: 36px;
  font-weight: 800;
  color: #FFFFFF;
  background-color: #D92525;
  padding: 10px 20px;
  border-radius: 8px;
  letter-spacing: 0;
}

.sub-text {
  font-size: 42px;
  line-height: 1.6;
  color: #222222;
  margin: 0;
  font-weight: 500;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-cover type-cover">
  <header class="page-header">
    <span class="header-icon">🧾</span>
    <span class="header-label">01 / 账单</span>
  </header>
  
  <section class="cover-title">
    <div class="title-line title-line-1">AI的利润表很漂亮</div>
    <div class="title-line title-line-2">但少算了一页</div>
  </section>
  
  <section class="sub-items">
    <div class="sub-item">
      <div class="sub-tag">对不上</div>
      <p class="sub-text">芯片、云和模型订阅，变成了巨头的收入。但把这份漂亮的报表和被AI改价的岗位放在一起看，账根本对不上。</p>
    </div>
    <div class="sub-item">
      <div class="sub-tag">没上车</div>
      <p class="sub-text">系统学会了流程，下一步不是发感谢信，而是招聘变少、外包单价下降、初级岗位合并。这笔账，完全不在公共账本里。</p>
    </div>
  </section>
</main>
</body>
</html>
