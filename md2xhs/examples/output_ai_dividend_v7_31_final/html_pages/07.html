<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-07 { width: 1242px; height: 1660px; box-sizing: border-box; background-color: #111111; color: #FFFFFF; padding: 100px 96px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; display: flex; flex-direction: column; } .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; font-size: 36px; color: #888888; font-weight: 500; } .page-label { letter-spacing: 0; } .page-icon { font-size: 42px; } .title-section { margin-bottom: 80px; } .page-title { font-size: 110px; font-weight: 900; line-height: 1.2; letter-spacing: 0; color: #FFFFFF; } .page-title:last-child { color: #FF4400; } .cta-list { display: flex; flex-direction: column; gap: 40px; flex: 1; } .cta-item { display: flex; flex-direction: column; gap: 16px; background-color: #1C1C1C; padding: 40px; border-radius: 12px; border-left: 8px solid #FF4400; } .cta-tag { font-size: 32px; font-weight: 700; color: #FF4400; letter-spacing: 0; } .cta-text { font-size: 40px; line-height: 1.6; color: #DDDDDD; margin: 0; font-weight: 400; letter-spacing: 0; }
</style>
</head>
<body>
<main class="page page-07 type-cta">
  <header class="page-header">
    <span class="page-label">07 / 征集</span>
    <span class="page-icon">💬</span>
  </header>
  <section class="title-section">
    <div class="page-title">需要更多工资条</div>
    <div class="page-title">而不是口号</div>
  </section>
  <section class="cta-list">
    <div class="cta-item">
      <div class="cta-tag">挑错</div>
      <p class="cta-text">如果你觉得利润估算偏保守，或者口径有漏洞，欢迎在评论区直接指出。</p>
    </div>
    <div class="cta-item">
      <div class="cta-tag">证据</div>
      <p class="cta-text">如果你所在行业被AI改价、减岗、外包替代，请留下具体事实。工资条、排班表比抱怨有用。</p>
    </div>
    <div class="cta-item">
      <div class="cta-tag">验证</div>
      <p class="cta-text">我正在考虑整理一份完整的账本。先看大家怎么挑错，再决定这笔账下一步怎么验。</p>
    </div>
  </section>
</main>
</body>
</html>
