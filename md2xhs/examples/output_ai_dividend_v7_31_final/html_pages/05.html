<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page {
  width: 1242px;
  height: 1660px;
  background-color: #F4F4F2;
  padding: 112px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  position: relative;
}

.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 80px;
}

.header-icon {
  font-size: 42px;
}

.header-label {
  font-size: 38px;
  font-weight: 600;
  color: #666;
  letter-spacing: 0;
}

.title-wrapper {
  margin-bottom: 120px;
}

.title-line {
  font-size: 120px;
  font-weight: 900;
  color: #1A1A1A;
  line-height: 1.25;
  letter-spacing: 0;
  margin: 0;
}

.list-wrapper {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.list-item {
  display: flex;
  flex-direction: column;
  gap: 24px;
  padding-bottom: 56px;
  margin-bottom: 56px;
  border-bottom: 2px solid #E0E0DE;
}

.list-item:last-child {
  padding-bottom: 0;
  margin-bottom: 0;
  border-bottom: none;
}

.item-tag {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  font-size: 38px;
  font-weight: 800;
  color: #D33F23;
  letter-spacing: 0;
  margin: 0;
}

.item-tag::before {
  content: "";
  display: block;
  width: 12px;
  height: 12px;
  background-color: #D33F23;
  border-radius: 2px;
}

.item-text {
  font-size: 42px;
  font-weight: 400;
  color: #333;
  line-height: 1.6;
  letter-spacing: 0;
  text-align: justify;
  margin: 0;
}
</style>
</head>
<body>
<main class="page page-05 type-body">
  <header class="header">
    <span class="header-icon">🪑</span>
    <span class="header-label">05 / 错位</span>
  </header>
  
  <section class="title-wrapper">
    <p class="title-line">效率和焦虑</p>
    <p class="title-line">坐在同一张工位</p>
  </section>

  <section class="list-wrapper">
    <div class="list-item">
      <div class="item-tag">翻译</div>
      <p class="item-text">知识工作者相信AI能提高效率，也担心被替代。公司说这是效率，工资条说它听不懂。</p>
    </div>
    <div class="list-item">
      <div class="item-tag">预言</div>
      <p class="item-text">这不是灾难预言，灾难预言太省事。这只是个会计问题：利润有清楚的入口，风险还在统计口径外。</p>
    </div>
    <div class="list-item">
      <div class="item-tag">结账</div>
      <p class="item-text">三天的初稿变三分钟，省下来的不是时间，是岗位预算。系统学会了流程，结果往往是招聘变少。</p>
    </div>
  </section>
</main>
</body>
</html>
