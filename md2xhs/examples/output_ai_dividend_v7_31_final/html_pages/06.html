<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-06 {
  width: 1242px;
  height: 1660px;
  background-color: #F7F7F9;
  color: #1A1A1A;
  box-sizing: border-box;
  padding: 100px 100px;
  position: relative;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
}

.page-header {
  margin-bottom: 40px;
}

.label-group {
  display: flex;
  align-items: center;
  gap: 16px;
}

.icon {
  font-size: 40px;
}

.label {
  font-size: 38px;
  font-weight: 600;
  color: #666;
  letter-spacing: 0;
}

.title-section {
  margin-bottom: 60px;
}

.page-title {
  font-size: 110px;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: 0;
  color: #111;
}

.page-title p {
  margin: 0;
}

.content-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.sub-item {
  background-color: #FFFFFF;
  padding: 32px 40px;
  border-radius: 16px;
  border-left: 8px solid #E63946;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.tag {
  display: inline-block;
  font-size: 36px;
  font-weight: 700;
  color: #E63946;
}

.text {
  font-size: 40px;
  line-height: 1.6;
  color: #333;
}

.steps-container {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.step-item {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  background-color: #FFFFFF;
  padding: 32px 40px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
}

.step-num {
  font-size: 48px;
  font-weight: 900;
  color: #E63946;
  line-height: 1;
  padding-top: 6px;
  min-width: 60px;
}

.step-text {
  font-size: 40px;
  line-height: 1.5;
  color: #222;
  margin: 0;
}
</style>
</head>
<body>
<main class="page page-06 type-flow">
  <header class="page-header">
    <div class="label-group">
      <span class="icon">📋</span>
      <span class="label">06 / 计划</span>
    </div>
  </header>
  <section class="title-section">
    <div class="page-title">
      <p>这笔账算到一半</p>
      <p>还没按发送键</p>
    </div>
  </section>
  <section class="content-section">
    <div class="sub-item">
      <span class="tag">总判断</span>
      <span class="text">与其用口号抱怨，不如把证据和计算过程摊开。如果账单确实有问题，作者下一步可能做三件事。</span>
    </div>
    <div class="steps-container">
      <div class="step-item">
        <div class="step-num">01</div>
        <p class="step-text">放出中美计算表格，把估算逻辑和基准数据写清楚，先看能不能经得起挑错。</p>
      </div>
      <div class="step-item">
        <div class="step-num">02</div>
        <p class="step-text">按行业整理被影响的岗位事实。不靠情绪凑数，只看外包单价、招聘冻结记录和排班表。</p>
      </div>
      <div class="step-item">
        <div class="step-num">03</div>
        <p class="step-text">写一版公共数据红利草案。不讲抽象主义，只算账本逻辑，找懂行的人继续对账。</p>
      </div>
    </div>
  </section>
</main>
</body>
</html>
