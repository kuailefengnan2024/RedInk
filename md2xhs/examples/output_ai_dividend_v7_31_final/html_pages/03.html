<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-03 {
  width: 1242px;
  height: 1660px;
  background-color: #121212;
  color: #FFFFFF;
  box-sizing: border-box;
  padding: 96px 96px;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
  position: relative;
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 38px;
  color: #888888;
  margin-bottom: 40px;
}

.title-section {
  margin-bottom: 56px;
}

.title-line {
  font-size: 96px;
  font-weight: 800;
  line-height: 1.25;
  color: #FFFFFF;
  margin: 0;
}

.metric-section {
  margin-bottom: 56px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.metric-highlight {
  font-size: 160px;
  font-weight: 900;
  color: #FFD700;
  line-height: 1.1;
}

.metric-sub {
  font-size: 38px;
  color: #A0A0A0;
  margin-top: 16px;
  padding-left: 16px;
  border-left: 6px solid #FFD700;
  line-height: 1.2;
}

.list-section {
  display: flex;
  flex-direction: column;
  gap: 36px;
  flex: 1;
}

.list-item {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-left: 24px;
  border-left: 4px solid #333333;
}

.item-tag {
  font-size: 36px;
  font-weight: 700;
  color: #FFD700;
}

.item-text {
  font-size: 38px;
  line-height: 1.5;
  color: #CCCCCC;
  margin: 0;
}

.footnote-section {
  font-size: 34px;
  color: #555555;
  text-align: left;
  margin-top: auto;
  line-height: 1.5;
}

.footnote-section p {
  margin: 0;
}
</style>
</head>
<body>
<main class="page page-03 type-estimate">
  <header class="header">
    <span class="icon">💰</span>
    <span class="label">03 / 巨头账本</span>
  </header>
  
  <section class="title-section">
    <p class="title-line">747亿美元超额利润</p>
    <p class="title-line">完全不在公共账本里</p>
  </section>

  <section class="metric-section">
    <div class="metric-highlight">747亿</div>
    <div class="metric-sub">美元 / 保守估算</div>
  </section>

  <section class="list-section">
    <div class="list-item">
      <span class="item-tag">硬件</span>
      <p class="item-text">NVIDIA数据中心收入1937亿美元，按毛利率粗算，新增毛利约558亿美元。</p>
    </div>
    <div class="list-item">
      <span class="item-tag">软件</span>
      <p class="item-text">微软Azure、AWS、Google Cloud和Meta广告效率提升，加上未上市模型公司，超额毛利保守估约189亿美元。</p>
    </div>
    <div class="list-item">
      <span class="item-tag">红利</span>
      <p class="item-text">如果拿20%算作公共数据红利，约1007亿元。重点不是分多少，而是这笔钱根本不在公共账户里。</p>
    </div>
  </section>

  <section class="footnote-section">
    <p>NVIDIA FY2026, Microsoft FY2025, Amazon/Alphabet/Meta 2025 财报保守推算</p>
  </section>
</main>
</body>
</html>
