<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-01 {
  width: 1242px;
  height: 1660px;
  background-color: #F8F8F8;
  color: #111111;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  box-sizing: border-box;
  padding: 110px 100px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 200px;
}

.icon {
  font-size: 44px;
}

.label {
  font-size: 40px;
  font-weight: 600;
  color: #555555;
  letter-spacing: 0;
}

.title-section {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.title-line {
  font-size: 136px;
  font-weight: 900;
  line-height: 1.15;
  color: #111111;
  letter-spacing: 0;
}

.title-line.highlight {
  color: #E53935;
}

.content-section {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 56px;
  background-color: #FFFFFF;
  padding: 64px 56px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.03);
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.sub-tag {
  font-size: 38px;
  font-weight: 800;
  color: #E53935;
  background-color: #FFEBEE;
  padding: 10px 24px;
  border-radius: 8px;
  width: fit-content;
  letter-spacing: 0;
}

.sub-text {
  font-size: 42px;
  line-height: 1.6;
  color: #333333;
  font-weight: 500;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-01 type-cover">
  <header class="header">
    <span class="icon">📄</span>
    <span class="label">01 / 封面</span>
  </header>
  <section class="title-section">
    <div class="title-line">AI的利润表很漂亮</div>
    <div class="title-line highlight">但少算了一页</div>
  </section>
  <section class="content-section">
    <div class="sub-item">
      <div class="sub-tag">被隐藏</div>
      <div class="sub-text">芯片、云和模型订阅变成了巨头收入。但被AI改价的岗位，没写进财报。</div>
    </div>
    <div class="sub-item">
      <div class="sub-tag">错位</div>
      <div class="sub-text">成本来自普通人，收入进公司账户。用户最后只收到了一份涨价通知。</div>
    </div>
  </section>
</main>
</body>
</html>
