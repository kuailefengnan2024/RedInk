<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-02 {
  width: 1242px;
  height: 1660px;
  background-color: #F2F4F7;
  box-sizing: border-box;
  padding: 100px 96px;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  position: relative;
}

.page-header {
  display: flex;
  align-items: center;
  margin-bottom: 60px;
}

.header-icon {
  font-size: 44px;
  margin-right: 16px;
}

.header-label {
  font-size: 38px;
  color: #555555;
  font-weight: 600;
}

.title-section {
  margin-bottom: 72px;
}

.page-title {
  font-size: 108px;
  font-weight: 900;
  line-height: 1.25;
  color: #111111;
  letter-spacing: 0;
}

.content-section {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.proof-list {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.proof-item {
  background-color: #FFFFFF;
  border-radius: 16px;
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.03);
}

.proof-tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: flex-start;
  background-color: #111111;
  color: #FFFFFF;
  font-size: 34px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 8px;
}

.proof-text {
  font-size: 40px;
  line-height: 1.6;
  color: #222222;
  font-weight: 400;
}
</style>
</head>
<body>
<main class="page page-02 type-body">
  <header class="page-header">
    <span class="header-icon">📉</span>
    <span class="header-label">02 / 就业账本</span>
  </header>
  <section class="title-section">
    <div class="page-title">系统没改变命运</div>
    <div class="page-title">它先改了招聘计划</div>
  </section>
  <section class="content-section">
    <div class="proof-list">
      <div class="proof-item">
        <div class="proof-tag">入场券</div>
        <div class="proof-text">AI没把所有人赶出办公室。它只是让外包单价下降，初级岗位合并。入口被收窄，年轻人最先感觉到。</div>
      </div>
      <div class="proof-item">
        <div class="proof-tag">年轻人</div>
        <div class="proof-text">Stanford口径很冷：22到25岁的软件开发者就业两年降了近20%。结果还没公布，岗位预算已经先瘦了。</div>
      </div>
      <div class="proof-item">
        <div class="proof-tag">换名字</div>
        <div class="proof-text">很少有企业承认因为AI裁员，他们管这叫「调整岗位结构」。不是效率提升，是岗位预算换了个说法。</div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
