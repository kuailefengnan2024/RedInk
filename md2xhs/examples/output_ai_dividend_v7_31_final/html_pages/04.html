<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-04 { width: 1242px; height: 1660px; background-color: #f7f7f5; color: #111; box-sizing: border-box; padding: 100px 96px; display: flex; flex-direction: column; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; } .page-header { margin-bottom: 48px; } .page-label { font-size: 38px; color: #666; font-weight: 600; margin-bottom: 24px; display: flex; align-items: center; } .icon { margin-right: 16px; font-size: 42px; } .page-title { font-size: 104px; font-weight: 900; line-height: 1.2; color: #000; } .title-line { margin-bottom: 8px; } .metric-section { margin-bottom: 48px; background-color: #fff; border-radius: 16px; padding: 48px 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.03); border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; } .highlight-value { font-size: 140px; font-weight: 900; color: #d92525; line-height: 1; margin-bottom: 24px; } .highlight-sub { font-size: 38px; color: #444; font-weight: 600; margin-bottom: 24px; background-color: #f0f0f0; padding: 12px 24px; border-radius: 8px; } .footnote { font-size: 32px; color: #888; text-align: center; line-height: 1.5; } .proof-list { display: flex; flex-direction: column; gap: 32px; } .proof-item { display: flex; align-items: flex-start; gap: 24px; } .proof-tag { flex-shrink: 0; font-size: 34px; font-weight: 700; color: #fff; background-color: #222; padding: 8px 16px; border-radius: 8px; line-height: 1.2; margin-top: 6px; } .proof-text { font-size: 40px; color: #333; line-height: 1.6; font-weight: 500; }
</style>
</head>
<body>
<main class="page page-04 type-estimate">
  <header class="page-header">
    <div class="page-label"><span class="icon">📊</span> 04 / 国内账本</div>
    <div class="page-title">
      <div class="title-line">国内也是类似的账</div>
      <div class="title-line">只是更难看清</div>
    </div>
  </header>
  <section class="metric-section">
    <div class="highlight-value">160-333亿</div>
    <div class="highlight-sub">人民币 / 讨论量级</div>
    <div class="footnote">阿里、腾讯、百度、华为、字节等巨头AI超额利润保守估算</div>
  </section>
  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">模糊</div>
      <div class="proof-text">巨头都在AI链条里，但超额利润没单独拆出来。只能先估算，合计大概160到333亿元。</div>
    </div>
    <div class="proof-item">
      <div class="proof-tag">装睡</div>
      <div class="proof-text">按20%算公共数据红利，是32到67亿元。数不大。但数不大和账不存在是两回事。前者是早期，后者是装睡。</div>
    </div>
    <div class="proof-item">
      <div class="proof-tag">代价</div>
      <div class="proof-text">国内的就业压力不是凭空的。ILO把AI影响拆到任务层面，它不一定让职业消失，它只改变工资单的厚度。</div>
    </div>
  </section>
</main>
</body>
</html>
