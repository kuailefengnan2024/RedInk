<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-03 {
  width: 1242px;
  height: 1660px;
  box-sizing: border-box;
  padding: 90px 96px;
  background-color: #111111;
  color: #F5F5F5;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
  position: relative;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 48px;
}

.header-icon {
  font-size: 40px;
}

.header-label {
  font-size: 38px;
  font-weight: 600;
  color: #A0A0A0;
  letter-spacing: 0;
}

.page-title-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 60px;
}

.page-title {
  font-size: 100px;
  font-weight: 800;
  line-height: 1.2;
  color: #FFFFFF;
  letter-spacing: 0;
}

.page-highlight {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  margin-bottom: 60px;
  padding-left: 32px;
  border-left: 12px solid #E65A28;
}

.highlight-number {
  font-size: 140px;
  font-weight: 900;
  color: #E65A28;
  line-height: 1;
  margin-bottom: 16px;
  letter-spacing: 0;
}

.highlight-sub {
  font-size: 42px;
  font-weight: 600;
  color: #CCCCCC;
  letter-spacing: 0;
}

.proof-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.proof-item {
  display: flex;
  align-items: flex-start;
  gap: 32px;
  background: #1C1C1E;
  padding: 32px;
  border-radius: 16px;
}

.proof-tag {
  flex-shrink: 0;
  background: #333336;
  color: #FFFFFF;
  font-size: 36px;
  font-weight: 700;
  padding: 12px 20px;
  border-radius: 8px;
  letter-spacing: 0;
  margin-top: 2px;
}

.proof-text {
  font-size: 38px;
  line-height: 1.5;
  color: #D1D1D6;
  letter-spacing: 0;
}

.page-footnote {
  margin-top: auto;
  font-size: 32px;
  color: #8E8E93;
  line-height: 1.5;
  border-top: 2px solid #2C2C2E;
  padding-top: 24px;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-03 type-estimate">
  <header class="page-header">
    <span class="header-icon">💰</span>
    <span class="header-label">03 / 巨头账本</span>
  </header>
  
  <section class="page-title-section">
    <div class="page-title">747亿美元超额利润</div>
    <div class="page-title">完全不在公共账本里</div>
  </section>

  <section class="page-highlight">
    <div class="highlight-number">747亿</div>
    <div class="highlight-sub">美元 / 保守估算</div>
  </section>

  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-tag">硬件</div>
      <div class="proof-text">NVIDIA数据中心收入1937亿美元，按毛利率粗算，新增毛利约558亿美元。</div>
    </div>
    <div class="proof-item">
      <div class="proof-tag">软件</div>
      <div class="proof-text">微软Azure、AWS、Google Cloud和Meta广告效率提升，加上未上市模型公司，超额毛利保守估约189亿美元。</div>
    </div>
    <div class="proof-item">
      <div class="proof-tag">红利</div>
      <div class="proof-text">如果拿20%算作公共数据红利，约1007亿元。重点不是怎么切蛋糕，是这笔钱根本不在公共账户里。</div>
    </div>
  </section>

  <div class="page-footnote">
    NVIDIA FY2026, Microsoft FY2025, Amazon/Alphabet/Meta 2025 财报保守推算
  </div>
</main>
</body>
</html>
