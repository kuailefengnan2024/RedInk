<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-04 {
    width: 1242px;
    height: 1660px;
    background-color: #111111;
    color: #FFFFFF;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    box-sizing: border-box;
    padding: 90px 100px;
    display: flex;
    flex-direction: column;
    position: relative;
}

.header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
}

.header-icon {
    font-size: 46px;
}

.header-label {
    font-size: 38px;
    color: #999999;
    font-weight: 500;
    letter-spacing: 0;
}

.page-title {
    font-size: 100px;
    font-weight: 800;
    line-height: 1.25;
    margin-bottom: 60px;
    letter-spacing: 0;
    color: #FFFFFF;
}

.page-title span {
    display: block;
}

.metric-container {
    background-color: #1A1A1A;
    border-radius: 16px;
    padding: 48px;
    margin-bottom: 60px;
    border-left: 8px solid #E8FF5A;
}

.metric-highlight {
    font-size: 120px;
    font-weight: 900;
    color: #E8FF5A;
    line-height: 1;
    margin-bottom: 20px;
    letter-spacing: 0;
}

.metric-sub {
    font-size: 40px;
    color: #999999;
    font-weight: 500;
    letter-spacing: 0;
}

.proof-list {
    display: flex;
    flex-direction: column;
    gap: 36px;
}

.proof-item {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.proof-tag {
    display: inline-block;
    align-self: flex-start;
    font-size: 34px;
    font-weight: 700;
    color: #111111;
    background-color: #E8FF5A;
    padding: 6px 16px;
    border-radius: 8px;
    letter-spacing: 0;
}

.proof-text {
    font-size: 40px;
    line-height: 1.6;
    color: #E0E0E0;
    font-weight: 400;
    letter-spacing: 0;
}

.footnote-container {
    margin-top: auto;
    padding-top: 32px;
    border-top: 2px solid #2A2A2A;
}

.footnote-text {
    font-size: 34px;
    color: #777777;
    line-height: 1.5;
    letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-04 type-estimate">
    <header class="header">
        <span class="header-icon">📊</span>
        <span class="header-label">04 / 国内账本</span>
    </header>
    
    <div class="page-title">
        <span>国内也是类似的账</span>
        <span>只是更难看清</span>
    </div>
    
    <div class="metric-container">
        <div class="metric-highlight">160-333亿</div>
        <div class="metric-sub">人民币 / 讨论量级</div>
    </div>
    
    <div class="proof-list">
        <div class="proof-item">
            <span class="proof-tag">模糊</span>
            <span class="proof-text">巨头都在AI链条里，但超额利润没单独拆出来。只能先估算，合计大概160到333亿元。</span>
        </div>
        <div class="proof-item">
            <span class="proof-tag">装睡</span>
            <span class="proof-text">按20%算公共数据红利，是32到67亿元。数不大。但数不大和账不存在是两回事。前者是早期，后者是装睡。</span>
        </div>
        <div class="proof-item">
            <span class="proof-tag">代价</span>
            <span class="proof-text">国内的就业压力不是凭空的。ILO把AI影响拆到任务层面，它不一定让职业消失，它只改变工资单的厚度。</span>
        </div>
    </div>
    
    <div class="footnote-container">
        <span class="footnote-text">* 阿里、腾讯、百度、华为、字节等巨头AI超额利润保守估算</span>
    </div>
</main>
</body>
</html>
