<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-05 { width: 1242px; height: 1660px; background-color: #F2F4F8; box-sizing: border-box; padding: 100px 96px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; display: flex; flex-direction: column; letter-spacing: 0; }
.page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 72px; }
.page-icon { font-size: 44px; }
.page-label { font-size: 38px; font-weight: 700; color: #555; }
.page-title { margin-bottom: 80px; }
.page-title p { font-size: 112px; font-weight: 900; line-height: 1.2; margin: 0; color: #111; }
.proof-list { display: flex; flex-direction: column; gap: 32px; flex: 1; }
.proof-item { background-color: #FFFFFF; border-radius: 16px; padding: 48px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.8); }
.proof-text { font-size: 42px; line-height: 1.6; color: #222; margin: 0; font-weight: 400; }
.proof-tag { font-size: 42px; font-weight: 900; color: #2D5DF6; margin-right: 20px; }
</style>
</head>
<body>
<main class="page page-05 type-body">
  <header class="page-header">
    <span class="page-icon">🪑</span>
    <span class="page-label">05 / 错位</span>
  </header>
  <section class="page-content">
    <div class="page-title">
      <p>效率和焦虑</p>
      <p>坐在同一张工位</p>
    </div>
    <div class="proof-list">
      <div class="proof-item">
        <p class="proof-text">
          <strong class="proof-tag">翻译</strong>
          知识工作者相信AI能提高效率，也担心被替代。公司说这是效率，工资条说它听不懂。
        </p>
      </div>
      <div class="proof-item">
        <p class="proof-text">
          <strong class="proof-tag">预言</strong>
          这不是灾难预言，灾难预言太省事。这只是个会计问题：利润有清楚的入口，风险还在统计口径外。
        </p>
      </div>
      <div class="proof-item">
        <p class="proof-text">
          <strong class="proof-tag">结账</strong>
          三天的初稿变三分钟，省下来的不是时间，是岗位预算。系统学会了流程，下一步不是感谢，是招聘变少。
        </p>
      </div>
    </div>
  </section>
</main>
</body>
</html>
