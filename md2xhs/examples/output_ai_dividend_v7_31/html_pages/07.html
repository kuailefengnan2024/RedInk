<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-07 {
  width: 1242px;
  height: 1660px;
  background-color: #111111;
  color: #FFFFFF;
  box-sizing: border-box;
  padding: 120px 100px;
  display: flex;
  flex-direction: column;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 140px;
}

.icon {
  font-size: 40px;
}

.label {
  font-size: 36px;
  color: #888888;
  font-weight: 600;
  letter-spacing: 0;
}

.content {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.title-group {
  margin-bottom: 140px;
}

.title-line {
  font-size: 112px;
  font-weight: 900;
  line-height: 1.25;
  margin: 0;
  color: #FFFFFF;
}

.action-list {
  display: flex;
  flex-direction: column;
  gap: 64px;
}

.action-item {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-left: 40px;
  border-left: 8px solid #E6FF00;
}

.action-tag {
  font-size: 32px;
  font-weight: 700;
  color: #E6FF00;
}

.action-text {
  font-size: 42px;
  line-height: 1.6;
  font-weight: 400;
  color: #DDDDDD;
  margin: 0;
}
</style>
</head>
<body>
<main class="page page-07 type-cta">
  <div class="header">
    <span class="icon">💬</span>
    <span class="label">07 / 征集</span>
  </div>
  <div class="content">
    <div class="title-group">
      <p class="title-line">需要更多工资条</p>
      <p class="title-line">而不是口号</p>
    </div>
    <div class="action-list">
      <div class="action-item">
        <div class="action-tag">挑错</div>
        <p class="action-text">如果你觉得利润估算偏保守，或者口径有漏洞，欢迎在评论区直接指出。</p>
      </div>
      <div class="action-item">
        <div class="action-tag">证据</div>
        <p class="action-text">如果你所在行业被AI改价、减岗、外包替代，请留下具体事实。工资条、排班表比抱怨有用。</p>
      </div>
      <div class="action-item">
        <div class="action-tag">验证</div>
        <p class="action-text">我正在考虑整理一份完整的账本。先看大家怎么挑错，再决定这笔账下一步怎么验。</p>
      </div>
    </div>
  </div>
</main>
</body>
</html>
