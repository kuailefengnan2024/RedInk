<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }


.page-01 {
  background-color: #FFFFFF;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  width: 1242px;
  height: 1660px;
  box-sizing: border-box;
  padding: 100px 96px;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 40px;
  font-weight: 600;
  color: #D92D20;
}

.title-box {
  margin-top: 220px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.title-line {
  font-size: 124px;
  font-weight: 900;
  line-height: 1.2;
  color: #101828;
  margin: 0;
  letter-spacing: 0;
  word-wrap: break-word;
}

.title-line:nth-child(2) {
  color: #D92D20;
}

.content-box {
  margin-top: auto;
  border-top: 4px solid #101828;
  padding-top: 72px;
  display: flex;
  flex-direction: column;
  gap: 64px;
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.sub-tag {
  font-size: 34px;
  font-weight: 700;
  color: #344054;
  background-color: #F2F4F7;
  padding: 10px 24px;
  border-radius: 8px;
  width: fit-content;
  letter-spacing: 0;
}

.sub-text {
  font-size: 44px;
  line-height: 1.6;
  color: #475467;
  font-weight: 400;
  margin: 0;
  letter-spacing: 0;
}
</style>
</head>
<body>
<main class="page page-01 type-cover">
  <header class="header">
    <span class="header-icon">📄</span>
    <span class="header-label">01 / 封面</span>
  </header>
  
  <div class="title-box">
    <p class="title-line">AI的利润表很漂亮</p>
    <p class="title-line">但少算了一页</p>
  </div>
  
  <div class="content-box">
    <div class="sub-item">
      <span class="sub-tag">被隐藏</span>
      <p class="sub-text">芯片、云和模型订阅变成了巨头收入。但被AI改价的岗位，没写进财报。</p>
    </div>
    <div class="sub-item">
      <span class="sub-tag">错位</span>
      <p class="sub-text">成本来自普通人，收入进公司账户。用户最后只收到了一份涨价通知。</p>
    </div>
  </div>
</main>
</body>
</html>
