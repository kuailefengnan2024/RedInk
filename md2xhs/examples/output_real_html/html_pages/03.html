<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
/* Global Styles */
:root {
  --bg-color: #111214;
  --text-color: #F0F0F0;
  --accent-color: #4ADE80;
  --muted-color: #888888;
  --border-color: #333333;
  --card-bg-color: #1A1B1E;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

.page {
  width: 1242px;
  height: 1660px;
  overflow: hidden;
  background-color: var(--bg-color);
  color: var(--text-color);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
  padding: 100px 100px;
}

.page-header {
  width: 100%;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 60px;
}

.page-label {
  font-size: 32px;
  font-weight: 500;
  color: var(--muted-color);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.page-title {
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -2px;
}

.page-title .accent {
  color: var(--accent-color);
}

.sub-item-list {
  list-style: none;
  margin-top: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sub-item-tag {
  font-size: 36px;
  font-weight: 600;
  color: var(--muted-color);
}

.sub-item-text {
  font-size: 42px;
  font-weight: 400;
  line-height: 1.4;
  color: var(--text-color);
}
.page-03 .page-title {
  font-size: 140px;
  margin-bottom: 80px;
}

.page-03 .card-list {
  gap: 24px;
}

.page-03 .card-item {
  background-color: var(--card-bg-color);
  padding: 32px 40px;
  border-radius: 16px;
  border: 1px solid var(--border-color);
}

.page-03 .sub-item-tag {
  font-size: 34px;
}

.page-03 .sub-item-text {
  font-size: 40px;
}
</style>
</head>
<body>
<main class="page page-03 type-hero">
  <header class="page-header">
    <span class="page-label">03 / 资产</span>
  </header>
  <div class="page-title">
    <p>这次的生产资料，</p>
    <p class="accent">有点特别</p>
  </div>
  <ul class="sub-item-list card-list">
    <li class="sub-item card-item">
      <span class="sub-item-tag">工业时代</span>
      <p class="sub-item-text">铁矿和石油有清晰的产权和账本，谁开采、谁加工、谁赚钱，记录得明明白白。</p>
    </li>
    <li class="sub-item card-item">
      <span class="sub-item-tag">网络时代</span>
      <p class="sub-item-text">宽带和服务器也有明确的物主和账单，IDC 机房按机柜和电费收钱，一分不会少。</p>
    </li>
    <li class="sub-item card-item">
      <span class="sub-item-tag">数据时代</span>
      <p class="sub-item-text">你的数据贡献没有井口和账本，只有一个打勾的弹窗，和一份随时更新的用户协议。</p>
    </li>
  </ul>
</main>
</body>
</html>
