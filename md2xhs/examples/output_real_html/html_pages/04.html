<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
/* Global Styles */
:root {
  --bg-color: #111214;
  --text-color: #F0F0F0;
  --accent-color: #4ADE80;
  --muted-color: #888888;
  --border-color: #333333;
  --card-bg-color: #1A1B1E;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

.page {
  width: 1242px;
  height: 1660px;
  overflow: hidden;
  background-color: var(--bg-color);
  color: var(--text-color);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
  padding: 100px 100px;
}

.page-header {
  width: 100%;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 60px;
}

.page-label {
  font-size: 32px;
  font-weight: 500;
  color: var(--muted-color);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.page-title {
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -2px;
}

.page-title .accent {
  color: var(--accent-color);
}

.sub-item-list {
  list-style: none;
  margin-top: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sub-item-tag {
  font-size: 36px;
  font-weight: 600;
  color: var(--muted-color);
}

.sub-item-text {
  font-size: 42px;
  font-weight: 400;
  line-height: 1.4;
  color: var(--text-color);
}
.page-04 {
  text-align: center;
}

.page-04 .content-wrapper {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

.page-04 .page-title {
  font-size: 92px;
  margin-bottom: auto;
  padding-top: 40px;
}

.page-04 .metric-container {
  margin-bottom: auto;
}

.page-04 .metric-highlight {
  font-size: 150px;
  font-weight: 700;
  color: var(--accent-color);
  line-height: 1.1;
  letter-spacing: -3px;
}

.page-04 .metric-sub {
  font-size: 42px;
  font-weight: 500;
  color: var(--text-color);
  margin-top: 24px;
}

.page-04 .footnote {
  font-size: 36px;
  color: var(--muted-color);
  margin-top: auto;
  padding-bottom: 20px;
}
</style>
</head>
<body>
<main class="page page-04 type-estimate">
  <header class="page-header">
    <span class="page-label">04 / 估算</span>
  </header>
  <div class="content-wrapper">
    <div class="page-title">
      <p>一张迟到的分成账单</p>
    </div>
    <div class="metric-container">
      <div class="metric-highlight">¥ 1000亿+</div>
      <div class="metric-sub">每年注入公共池的利润规模</div>
    </div>
    <div class="footnote">基于头部公司利润估算，讨论量级</div>
  </div>
</main>
</body>
</html>
