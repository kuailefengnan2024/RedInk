<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
/* Global Styles */
:root {
  --bg-color: #111214;
  --text-color: #F0F0F0;
  --accent-color: #4ADE80;
  --muted-color: #888888;
  --border-color: #333333;
  --card-bg-color: #1A1B1E;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

.page {
  width: 1242px;
  height: 1660px;
  overflow: hidden;
  background-color: var(--bg-color);
  color: var(--text-color);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  flex-direction: column;
  padding: 100px 100px;
}

.page-header {
  width: 100%;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 60px;
}

.page-label {
  font-size: 32px;
  font-weight: 500;
  color: var(--muted-color);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.page-title {
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -2px;
}

.page-title .accent {
  color: var(--accent-color);
}

.sub-item-list {
  list-style: none;
  margin-top: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.sub-item {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sub-item-tag {
  font-size: 36px;
  font-weight: 600;
  color: var(--muted-color);
}

.sub-item-text {
  font-size: 42px;
  font-weight: 400;
  line-height: 1.4;
  color: var(--text-color);
}
.page-01 {
  padding: 0;
  justify-content: center;
}
.page-01 .content-wrapper {
  height: 100%;
  width: 100%;
  padding: 120px 100px;
  display: flex;
  flex-direction: column;
}
.page-01 .page-title {
  font-size: 160px;
  letter-spacing: -4px;
  margin-top: 20px;
  margin-bottom: auto;
}
.page-01 .divider {
  width: 100%;
  height: 1px;
  background-color: var(--border-color);
  margin-bottom: 60px;
}
.page-01 .sub-item-list {
  margin-top: 0;
  gap: 48px;
}
</style>
</head>
<body>
<main class="page page-01 type-cover">
  <div class="content-wrapper">
    <div class="page-title">
      <p>你的数据，</p>
      <p class="accent">喂饱了谁的财报？</p>
    </div>
    <div class="divider"></div>
    <ul class="sub-item-list">
      <li class="sub-item">
        <span class="sub-item-tag">喂养</span>
        <p class="sub-item-text">你的照片、帖子、聊天记录，构成了模型的智慧。模型产生的利润，进入了公司财报。</p>
      </li>
      <li class="sub-item">
        <span class="sub-item-tag">回报</span>
        <p class="sub-item-text">数据被拿走，你只多收到一个弹窗和一份你不会读的用户协议，以及会员涨价通知。</p>
      </li>
    </ul>
  </div>
</main>
</body>
</html>
