<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
.page {
  box-sizing: border-box;
  width: 1242px;
  height: 1660px;
  overflow: hidden;
  position: relative;
  padding: 100px !important;
  display: flex !important;
  flex-direction: column !important;
}
h1, h2, h3, h4, h5, h6, p, span, li, div {
  text-wrap: pretty;
}
.page-title, h1, h2, h3, h4, h5, h6 {
  text-wrap: balance;
}
.system-page-label {
  font-size: 38px;
  font-weight: 600;
  color: #888888;
  margin-bottom: 48px;
  text-align: left;
  width: 100%;
  font-family: system-ui, -apple-system, sans-serif;
  letter-spacing: 0;
}

/* This is a shared CSS file that is not used in this specific project. */
.page-07 {
  justify-content: space-between;
  gap: 80px;
}

.page-header {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.page-icon {
  font-size: 80px;
  line-height: 1;
  text-align: center;
}

.page-title {
  font-size: 112px;
  font-weight: 700;
  line-height: 1.3;
  color: #111;
  text-align: center;
}

.cta-list {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.cta-item {
  background-color: #F3F4F6;
  border-radius: 16px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.cta-tag {
  font-size: 38px;
  font-weight: 600;
  line-height: 1;
  color: #0052FF;
  padding: 10px 16px;
  background-color: #E6EEFF;
  border-radius: 8px;
  align-self: flex-start;
}

.cta-text {
  font-size: 40px;
  line-height: 1.6;
  color: #333;
  text-wrap: pretty;
}
</style>
</head>
<body>
<main class="page page-07 type-cta">
  <div class="system-page-label">07 / 07</div>
  <header class="page-header">
    
    <h1 class="page-title">这只是个想法<br>欢迎来抬杠<span style="white-space: nowrap;">或补充</span></h1>
  </header>
  <section class="cta-list">
    <div class="cta-item">
      <div class="cta-tag">聊事实</div>
      <p class="cta-text">你在工作中看到哪些岗位调整、外包单价变化？欢迎在评论区提供具体案例，让这本账更真实。</p>
    </div>
    <div class="cta-item">
      <div class="cta-tag">挑毛病</div>
      <p class="cta-text">对这本账的算法、逻辑有不同看法？直接说。反对意见比廉价的赞同更有价值。</p>
    </div>
    <div class="cta-item">
      <div class="cta-tag">然后呢</div>
      <p class="cta-text">如果讨论能提供足够多的事实和角度，作者会联合朋友把基金的核算细节和架构草案做得更具体。</p>
    </div>
  </section>
</main>
<script>
(function() {
    const page = document.querySelector('.page');
    if (!page) return;
    
    // Ensure the page root itself is exactly fixed size
    page.style.width = '1242px';
    page.style.height = '1660px';
    page.style.boxSizing = 'border-box';
    page.style.overflow = 'hidden';
    page.style.position = 'relative';
    page.style.display = 'flex';
    page.style.flexDirection = 'column';
    
    // Check if the content overflows the page height
    const scrollHeight = page.scrollHeight;
    const clientHeight = 1660;
    
    if (scrollHeight > clientHeight) {
        const style = window.getComputedStyle(page);
        const paddingTop = parseFloat(style.paddingTop) || 0;
        const paddingBottom = parseFloat(style.paddingBottom) || 0;
        
        const label = page.querySelector('.system-page-label');
        const labelHeight = label ? label.offsetHeight + parseFloat(window.getComputedStyle(label).marginBottom || 0) : 0;
        const availableHeight = clientHeight - paddingTop - paddingBottom - labelHeight;
        
        const children = Array.from(page.children).filter(child => !child.classList.contains('system-page-label'));
        if (children.length === 0) return;
        
        const wrapper = document.createElement('div');
        wrapper.className = 'page-content-wrapper';
        wrapper.style.width = '100%';
        wrapper.style.height = 'auto';
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        
        // Move children into wrapper
        children.forEach(child => wrapper.appendChild(child));
        page.appendChild(wrapper);
        
        // Measure content height and scale if it exceeds available space
        const contentHeight = wrapper.offsetHeight;
        if (contentHeight > availableHeight) {
            const scale = availableHeight / contentHeight;
            wrapper.style.transform = 'scale(' + scale + ')';
            wrapper.style.transformOrigin = 'top center';
        }
    }
})();
</script>
</body>
</html>
