<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1242, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 1242px; height: 1660px; overflow: hidden; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
.page {
  box-sizing: border-box;
  width: 1242px;
  height: 1660px;
  overflow: hidden;
  position: relative;
  padding: 100px !important;
  display: flex !important;
  flex-direction: column !important;
}
h1, h2, h3, h4, h5, h6, p, span, li, div {
  text-wrap: pretty;
}
.page-title, h1, h2, h3, h4, h5, h6 {
  text-wrap: balance;
}
.system-page-label {
  font-size: 38px;
  font-weight: 600;
  color: #888888;
  margin-bottom: 48px;
  text-align: left;
  width: 100%;
  font-family: system-ui, -apple-system, sans-serif;
  letter-spacing: 0;
}


.page-02 {
  justify-content: flex-start;
}

.page-title-container {
  width: 100%;
}

.page-title {
  font-size: 108px;
  font-weight: 600;
  line-height: 1.3;
  color: #111111;
  text-align: left;
  margin: 0;
  padding: 0;
  text-wrap: pretty;
}

.proof-list {
  margin-top: 60px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.proof-item {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-bottom: 40px;
  border-bottom: 2px solid #EEEEEE;
}

.proof-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.proof-header {
  display: flex;
  align-items: center;
}

.proof-tag {
  background-color: #F0F0F0;
  color: #333333;
  font-size: 34px;
  font-weight: 500;
  padding: 6px 18px;
  border-radius: 8px;
  line-height: 1.5;
}

.proof-text {
  font-size: 40px;
  line-height: 1.6;
  color: #333333;
  text-align: left;
  text-wrap: pretty;
  margin: 0;
}

.metric-container {
  margin-top: auto;
  padding-top: 40px;
  text-align: center;
  width: 100%;
}

.metric {
  background-color: #FAFAFA;
  border-radius: 18px;
  padding: 48px 24px;
}

.metric-value {
  font-size: 148px;
  font-weight: 700;
  color: #111111;
  line-height: 1.1;
  margin: 0;
}

.metric-label {
  font-size: 38px;
  color: #888888;
  margin-top: 12px;
  line-height: 1.5;
}

.footnote {
  width: 100%;
  text-align: center;
  font-size: 32px;
  color: #AAAAAA;
  margin-top: 40px;
  padding: 0;
  line-height: 1.5;
  text-wrap: pretty;
}
</style>
</head>
<body>
<main class="page page-02 type-estimate">
  <div class="system-page-label">02 / 07</div>
  <header class="page-title-container">
    <p class="page-title">AI多赚的钱<br><span style="white-space: nowrap;">美国公司</span>先拿走了大头</p>
  </header>
  <section class="proof-list">
    <div class="proof-item">
      <div class="proof-header">
        <span class="proof-tag">算力</span>
      </div>
      <p class="proof-text">NVIDIA 一家公司，靠 AI 算力驱动的新增毛利，一年就估算约 558 亿美元，毛利率高达 75%。</p>
    </div>
    <div class="proof-item">
      <div class="proof-header">
        <span class="proof-tag">云+广告</span>
      </div>
      <p class="proof-text">微软、谷歌、Meta 这些公司，靠云服务和 AI 推荐，一年多赚的钱合计估算也有 139 亿美元。</p>
    </div>
    <div class="proof-item">
      <div class="proof-header">
        <span class="proof-tag">模型服务</span>
      </div>
      <p class="proof-text">OpenAI 这类公司通过企业 API 和订阅赚的钱，估算约 50 亿美元。卖的也是用<span style="white-space: nowrap;">公共数据</span>训练出的能力。</p>
    </div>
  </section>
  <section class="metric-container">
    <div class="metric">
      <p class="metric-value">≈ 747 亿美元</p>
      <p class="metric-label">年度超额收益（讨论量级）</p>
    </div>
  </section>
  <p class="footnote">数据源：机构财报预测与市场估算，仅用于讨论量级</p>
</main>
<script>
(function() {
    const page = document.querySelector('.page');
    if (!page) return;
    
    // Ensure the page root itself is exactly fixed size
    page.style.width = '1242px';
    page.style.height = '1660px';
    page.style.boxSizing = 'border-box';
    page.style.overflow = 'hidden';
    page.style.position = 'relative';
    page.style.display = 'flex';
    page.style.flexDirection = 'column';
    
    // Check if the content overflows the page height
    const scrollHeight = page.scrollHeight;
    const clientHeight = 1660;
    
    if (scrollHeight > clientHeight) {
        const style = window.getComputedStyle(page);
        const paddingTop = parseFloat(style.paddingTop) || 0;
        const paddingBottom = parseFloat(style.paddingBottom) || 0;
        
        const label = page.querySelector('.system-page-label');
        const labelHeight = label ? label.offsetHeight + parseFloat(window.getComputedStyle(label).marginBottom || 0) : 0;
        const availableHeight = clientHeight - paddingTop - paddingBottom - labelHeight;
        
        const children = Array.from(page.children).filter(child => !child.classList.contains('system-page-label'));
        if (children.length === 0) return;
        
        const wrapper = document.createElement('div');
        wrapper.className = 'page-content-wrapper';
        wrapper.style.width = '100%';
        wrapper.style.height = 'auto';
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        
        // Move children into wrapper
        children.forEach(child => wrapper.appendChild(child));
        page.appendChild(wrapper);
        
        // Measure content height and scale if it exceeds available space
        const contentHeight = wrapper.offsetHeight;
        if (contentHeight > availableHeight) {
            const scale = availableHeight / contentHeight;
            wrapper.style.transform = 'scale(' + scale + ')';
            wrapper.style.transformOrigin = 'top center';
        }
    }
})();
</script>
</body>
</html>
