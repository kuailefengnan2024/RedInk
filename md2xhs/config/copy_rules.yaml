style:
  - 大标题要极大、极短、极锋利
  - 小字要详尽、条理清楚、信息密度高
  - 小字单条 30～82 字，不能空泛
  - 小字必须有例子、因果或账本逻辑
  - 小字不能像 AI 摘要，不能只有观点没有论证
  - 具体名词优于抽象词
  - 事实优于比喻，不硬塞报价单、发票、上桌这类道具词
  - 封面必须是反常识判断，不写工整但钝的并列句
  - 标题必须平实好懂，少用利润表、公共账本、统计口径这类抽象词
  - 允许口语：发完就走、这笔账
  - 禁用 AI 套话与公文腔
  - 禁用说教口吻，不把用户当学生
  - 禁用煽动口吻，不把用户当队伍
  - 禁用平台套话，不写关注我、搞钱、避坑指南
  - 封面必须是独特观点，不是问句模板
  - 末页必须有明确 CTA

replace:
  征税: 专项筹集
  征收: 筹集
  立法: 制度设计
  倒逼: 推动讨论
  首先: 先
  数据税: 数据账
  资源税: 资源账
  再分配: 分账
  不是空想: 不是概念图
