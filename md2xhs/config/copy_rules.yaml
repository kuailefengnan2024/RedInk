# 小红书轮播文案规则（lint + prompt 共用）

page_count:
  suggest_min: 6
  suggest_max: 12
  # 仅作 prompt 参考，不强制；分页由 LLM 自行规划

title:
  max_lines: 2
  max_chars_per_line: 14

title_banned_phrases:
  - 利润表
  - 公共账本
  - 统计口径
  - 超额利润
  - 数据红利
  - 账本的背面
  - 弹窗与账户
  - 隐蔽的账单
  - 链条

